<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCRM</title>
<link rel="icon" type="image/png" href="/mbi-logo.png">
<link rel="apple-touch-icon" href="/mbi-logo.png">
<!--
  ============================================================
  PulseCRM — hosted build (Firebase Firestore + Claude API)
  ============================================================
  Single vanilla-HTML app. No build step, no bundler. Hosted on Vercel.
  It will NOT run inside a sandboxed preview (Firebase + external calls
  are blocked there) — that's expected. Deploy it to see it live.

  SETUP (three things, then host):

  1) FIREBASE
     - console.firebase.google.com → create project
     - Build → Firestore Database → Create (start in TEST mode)
     - Build → Authentication → Sign-in method → enable Google
     - Project settings → Your apps → Web app → copy config
     - Paste it into firebaseConfig below
     - Until configured, the app runs on in-memory DEMO data so you can
       explore the whole UI. Writes won't persist until Firebase is set.

  2) AI PROXY (Summaries, next-best-action, email drafts, assistant)
     - You can't call Anthropic from the browser, so api/claude.js holds
       ANTHROPIC_API_KEY server-side. Contract: POST {prompt, system} → {text}.
     - AI_ENDPOINT below points at it (same-origin, co-located on Vercel).

  3) HOST
     - Deploy the repo to Vercel. Share the URL.
  ============================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap');
  :root{
    --ink:#101322; --muted:#5b6172; --faint:#959bab; --line:#e6e8ef;
    --surface:#ffffff; --surface-2:#f7f8fb; --canvas:#f1f2f6;
    --accent:#5b5bf0; --accent-2:#8b5cf6; --accent-soft:#eeeefe; --accent-ink:#4a3fd6;
    --ok:#16a34a; --ok-soft:#e7f7ee; --warn:#d97706; --warn-soft:#fdf2e0; --danger:#dc2626; --danger-soft:#fde8e8;
    --shadow:0 1px 2px rgba(16,19,34,.04),0 4px 16px rgba(16,19,34,.05);
    --shadow-lg:0 8px 40px rgba(16,19,34,.16);
    --r:14px; --r-sm:10px;
  }
  [data-theme="dark"]{
    --ink:#eef0f6; --muted:#a4abbd; --faint:#6b7180; --line:#262a38;
    --surface:#161924; --surface-2:#1c2030; --canvas:#0e1019;
    --accent:#7b7bff; --accent-2:#a78bfa; --accent-soft:#1e1f3a; --accent-ink:#b9b9ff;
    --ok:#34d399; --ok-soft:#0f2a20; --warn:#fbbf24; --warn-soft:#2a2110; --danger:#f87171; --danger-soft:#2a1414;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 24px rgba(0,0,0,.35);
    --shadow-lg:0 12px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;}
  button,select,textarea,input{font-family:inherit;color:inherit;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;margin:0;}
  a{color:inherit;}
  ::selection{background:var(--accent-soft);}
  .spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;opacity:.7;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* ---------- shell ---------- */
  :root{--nav-w:236px;--nav-collapsed-w:54px;}
  .shell{display:grid;grid-template-columns:var(--nav-w) 1fr;min-height:100vh;transition:grid-template-columns .2s ease;}
  .sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:hidden;transition:padding .2s ease,width .2s ease;}
  .nav-resize{position:absolute;top:0;right:0;width:5px;height:100%;cursor:col-resize;z-index:10;background:transparent;transition:background .15s;}
  .nav-resize:hover,.nav-resize.dragging{background:var(--accent);opacity:.35;border-radius:0;}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;overflow:hidden;}
  .brand .logo{width:30px;height:30px;object-fit:contain;flex:none;}
  .brand b{font-size:18px;font-weight:600;white-space:nowrap;transition:opacity .15s,width .2s;}
  .nav{display:flex;flex-direction:column;gap:2px;}
  .nav button{display:flex;align-items:center;gap:11px;border:none;background:transparent;color:var(--muted);font-size:13.5px;font-weight:500;padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:background .14s,color .14s,padding .2s,justify-content .2s;width:100%;}
  .nav button:hover{background:var(--surface-2);color:var(--ink);}
  .nav button.on{background:var(--accent-soft);color:var(--accent-ink);}
  .nav button svg{width:17px;height:17px;flex:none;}
  .nav button span{white-space:nowrap;overflow:hidden;transition:opacity .15s,max-width .2s;max-width:200px;}
  .nav .badge{margin-left:auto;font-size:10.5px;font-weight:600;background:var(--danger-soft);color:var(--danger);border-radius:20px;padding:1px 7px;white-space:nowrap;}
  .nav-sec{font-size:10.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:14px 11px 6px;white-space:nowrap;overflow:hidden;transition:opacity .15s,max-height .2s;max-height:40px;}
  .side-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;overflow:hidden;}
  .me{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--r-sm);overflow:hidden;}
  .me .ava{width:30px;height:30px;}
  .me .info{min-width:0;flex:1;overflow:hidden;transition:opacity .15s,max-width .2s;max-width:200px;}
  .me .info .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .me .info .em{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-collapse-btn{flex:none;border:none;background:transparent;color:var(--faint);cursor:pointer;padding:5px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:background .14s,color .14s;margin-left:auto;}
  .nav-collapse-btn:hover{background:var(--surface-2);color:var(--ink);}
  .nav-collapse-btn svg{width:16px;height:16px;flex:none;transition:transform .2s;}
  /* collapsed sidebar — icon-only mode */
  .sidebar.collapsed{padding:18px 8px;}
  .sidebar.collapsed .brand b,.sidebar.collapsed .nav-sec,.sidebar.collapsed .nav button span,.sidebar.collapsed .me .info,.sidebar.collapsed [data-action=signout]{opacity:0;max-width:0;max-height:0;pointer-events:none;}
  .sidebar.collapsed .nav button{justify-content:center;padding:9px 0;}
  .sidebar.collapsed .nav-collapse-btn svg{transform:rotate(180deg);}
  .sidebar.collapsed .nav .badge{display:none;}
  /* keep expand button accessible when collapsed */
  .sidebar.collapsed .brand{padding-left:0;padding-right:0;justify-content:center;}
  .sidebar.collapsed .brand .logo{display:none;}
  .sidebar.collapsed .nav-collapse-btn{margin-left:0;}

  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:14px 26px;background:color-mix(in srgb,var(--canvas) 82%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;color:var(--faint);font-size:13px;cursor:pointer;transition:border-color .14s;white-space:nowrap;overflow:hidden;height:36px;box-sizing:border-box;}
  .search:hover{border-color:var(--accent);}
  .search svg{width:16px;height:16px;flex:none;}
  .search kbd{margin-left:auto;font-family:inherit;font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--muted);}
  .topbar .sp{flex:1;}
  .iconbtn{width:36px;height:36px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .14s,color .14s;}
  .iconbtn:hover{background:var(--surface-2);color:var(--ink);}
  .iconbtn svg{width:17px;height:17px;}
  .content{padding:26px;animation:fadein .25s ease;}

  /* ---------- buttons ---------- */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:var(--r-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .14s,transform .05s,border-color .14s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn:hover{background:var(--surface-2);}
  .btn:active{transform:scale(.99);}
  .btn svg{width:15px;height:15px;}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(91,91,240,.32);}
  .btn.primary:hover{filter:brightness(1.06);background:linear-gradient(135deg,var(--accent),var(--accent-2));}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);}
  .btn.ghost:hover{background:var(--surface-2);color:var(--ink);}
  .btn.danger{color:var(--danger);}
  .btn.danger:hover{background:var(--danger-soft);}
  .btn:disabled{opacity:.5;cursor:default;}

  /* ---------- generic bits ---------- */
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
  .pagehead h1{font-size:24px;font-weight:600;}
  .pagehead .sub{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .ava{border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;flex:none;}
  .avas{display:flex;}
  .avas .ava{border:2px solid var(--surface);margin-left:-7px;}
  .avas .ava:first-child{margin-left:0;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--line);white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;}
  .tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:7px;background:var(--accent-soft);color:var(--accent-ink);}
  .muted{color:var(--muted);} .faint{color:var(--faint);}

  /* ---------- cards / grid ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:18px;}
  .stat{padding:16px 18px;position:relative;overflow:hidden;}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px;}
  .stat .lbl .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent-ink);}
  .stat .lbl .ic svg{width:15px;height:15px;}
  .stat .val{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:600;margin-top:10px;letter-spacing:-.02em;}
  .stat .delta{font-size:12px;margin-top:3px;color:var(--muted);}
  .stat .delta.up{color:var(--ok);} .stat .delta.down{color:var(--danger);}
  .panel{padding:18px 20px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .panel-head h2{font-size:15px;font-weight:600;}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start;}
  @media(max-width:980px){.grid2{grid-template-columns:1fr;}}

  /* ---------- table ---------- */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .input{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;font-size:13px;}
  .input:focus{outline:none;border-color:var(--accent);}
  .field-search{flex:1;max-width:320px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 12px;}
  .field-search input{border:none;background:none;padding:9px 0;font-size:13px;width:100%;}
  .field-search input:focus{outline:none;}
  .field-search svg{width:15px;height:15px;color:var(--faint);flex:none;}
  table{width:100%;border-collapse:collapse;}
  .tablecard{overflow:hidden;}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap;}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover{background:var(--surface-2);}
  .cellname{font-weight:600;display:flex;align-items:center;gap:10px;}
  .rowact{opacity:0;transition:opacity .12s;}
  tr:hover .rowact{opacity:1;}

  /* ---------- kanban ---------- */
  .board{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(248px,1fr);gap:13px;overflow-x:auto;padding-bottom:8px;align-items:start;}
  .kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:10px;display:flex;flex-direction:column;gap:9px;min-height:120px;transition:background .12s,outline .12s;}
  .kcol.dragover{outline:2px dashed var(--accent);outline-offset:-3px;background:var(--accent-soft);}
  .kcol-head{display:flex;align-items:center;gap:8px;padding:2px 4px;}
  .kcol-head .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .kcol-head .nm{font-size:12.5px;font-weight:600;}
  .kcol-head .ct{font-size:11px;color:var(--faint);}
  .kcol-head .tot{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--muted);}
  .dealcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;cursor:grab;box-shadow:var(--shadow);transition:box-shadow .12s,transform .05s;display:flex;flex-direction:column;gap:7px;}
  .dealcard:active{cursor:grabbing;}
  .dealcard.dragging{opacity:.4;}
  .dealcard:hover{box-shadow:var(--shadow-lg);}
  .dealcard .dn{font-size:13.5px;font-weight:600;line-height:1.3;}
  .dealcard .dco{font-size:11.5px;color:var(--muted);}
  .dealcard .dfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:1px;}
  .dealcard .dval{font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;}
  .prio{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 7px;border-radius:6px;}
  .prio.high{background:var(--danger-soft);color:var(--danger);}
  .prio.medium{background:var(--warn-soft);color:var(--warn);}
  .prio.low{background:var(--surface-2);color:var(--muted);}
  /* vertical kanban */
  .board.vert{display:flex;flex-direction:column;overflow-x:visible;padding-bottom:0;}
  .board.vert .kcol{flex-direction:row;flex-wrap:wrap;align-items:flex-start;min-height:auto;gap:9px;}
  .board.vert .kcol-head{flex:none;width:132px;min-width:132px;flex-direction:column;align-items:flex-start;gap:4px;padding:4px 10px 4px 4px;border-right:2px solid var(--line);align-self:stretch;}
  .board.vert .kcol-head .tot{margin-left:0;}
  .board.vert .dealcard{width:200px;flex:none;}

  /* ---------- timeline ---------- */
  .timeline{display:flex;flex-direction:column;gap:2px;}
  .tl-item{display:flex;gap:12px;padding:4px 0;}
  .tl-rail{display:flex;flex-direction:column;align-items:center;flex:none;}
  .tl-node{width:28px;height:28px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .tl-node svg{width:14px;height:14px;}
  .tl-line{flex:1;width:2px;background:var(--line);margin:3px 0;min-height:6px;}
  .tl-body{padding-bottom:14px;flex:1;min-width:0;}
  .tl-body .tx{font-size:13px;}
  .tl-body .mt{font-size:11.5px;color:var(--faint);margin-top:2px;}

  /* ---------- empty / skeleton ---------- */
  .empty{text-align:center;padding:54px 20px;}
  .empty .ill{width:54px;height:54px;border-radius:16px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .empty .ill svg{width:26px;height:26px;}
  .empty h3{font-size:16px;margin-bottom:5px;}
  .empty p{font-size:13px;color:var(--muted);margin:0 auto 16px;max-width:340px;}
  .skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--line) 37%,var(--surface-2) 63%);background-size:400% 100%;animation:sk 1.3s ease infinite;border-radius:7px;}
  @keyframes sk{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  /* ---------- drawer / modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(10,12,20,.42);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(520px,100vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:61;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.show{transform:none;}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 22px;border-bottom:1px solid var(--line);}
  .drawer-head h2{font-size:17px;font-weight:600;}
  .drawer-body{padding:20px 22px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:13.5px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:70px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field-checks{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
  .field-check-item{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
  .field-check-item + label{font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--line);cursor:pointer;transition:background .12s,color .12s,border-color .12s;user-select:none;}
  .field-check-item:checked + label{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent);}

  /* detail header */
  .detail-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
  .detail-head .big-ava{width:60px;height:60px;border-radius:16px;font-size:22px;}
  .detail-head h1{font-size:22px;}
  .detail-head .meta{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:9px 16px;font-size:13px;}
  .kv dt{color:var(--faint);} .kv dd{margin:0;font-weight:500;}
  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:14px;padding:0;}
  .backlink:hover{color:var(--ink);}

  /* ---------- AI panel ---------- */
  .ai-fab{position:fixed;right:24px;bottom:24px;z-index:55;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 8px 28px rgba(91,91,240,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .ai-fab:hover{transform:scale(1.06);}
  .ai-fab svg{width:24px;height:24px;}
  .ai-panel{position:fixed;top:0;right:0;height:100vh;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:62;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .ai-panel.show{transform:none;}
  .ai-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);}
  .ai-head .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;}
  .ai-head .logo svg{width:17px;height:17px;}
  .ai-head h2{font-size:15px;font-weight:600;}
  .ai-head .sub{font-size:11px;color:var(--faint);}
  .ai-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
  .ai-msg{font-size:13px;line-height:1.55;white-space:pre-wrap;}
  .ai-msg.user{align-self:flex-end;background:var(--accent);color:#fff;padding:9px 13px;border-radius:14px 14px 3px 14px;max-width:85%;}

const dayStart=t=>{const d=new Date(t);d.setHours(0,0,0,0);return d.getTime();};
const isToday=t=>t&&dayStart(t)===dayStart(Date.now());
const isOverdue=t=>t&&dayStart(t)<dayStart(Date.now());

async function dbAdd(coll,data,silent){

  }catch(e){ toast("Save failed: "+e.message,"err"); }
}
async function dbUpdate(coll,id,patch,silent){
  const p={...patch,updatedAt:Date.now()};
  try{
    if(fbReady){ await updateDoc(doc(db,coll,id),p); }
    else { const o=state[coll].find(x=>x.id===id); if(o)Object.assign(o,p); render(); }
    if(!silent)toast("Updated","ok");

async function dbRemove(coll,id,label){ // soft delete

    else { const o=state[coll].find(x=>x.id===id); if(o)o.deletedAt=Date.now(); render(); }

/* ---------------- AI ---------------- */
function workspaceContext(){
  const C=live(state.contacts), D=live(state.deals), Co=live(state.companies), T=live(state.tasks);
  const open=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  return [
    `PulseCRM workspace snapshot (the ONLY data you may use):`,
    `Contacts (${C.length}): `+C.slice(0,40).map(c=>`${contactName(c)} [${c.status||"Lead"}] ${companyById(c.companyId)?.name||""}`).join("; "),
    `Companies (${Co.length}): `+Co.slice(0,25).map(c=>c.name+(c.industry?` (${c.industry})`:"")+( c.expectedClose?` close:${fmtDate(c.expectedClose)}`:""  )).join("; "),
    `Open deals (${open.length}): `+open.slice(0,40).map(d=>`"${d.name}" ${money(d.value)} @ ${d.stage} (${companyById(d.companyId)?.name||"?"}) prio:${d.priority||"med"} close:${fmtDate(d.expectedClose)}${d.renewalDate?" renewal:"+fmtDate(d.renewalDate):""}`).join("; "),
    `Open tasks (${T.filter(t=>t.status!=="done").length}): `+T.filter(t=>t.status!=="done").slice(0,30).map(t=>`${t.title} (due ${fmtDate(t.due)})`).join("; "),
  ].join("\n");
}
const AI_SYSTEM=`You are the PulseCRM AI assistant for a sales team. STRICT PRIVACY: use ONLY the workspace snapshot provided in the prompt. Never invent contacts, deals, or numbers that are not present, and never reference any other organization's data. Be concise, concrete, and sales-focused. Use plain text (no markdown headers).`;
async function askAI(userPrompt,extraContext){
  const prompt=`${workspaceContext()}\n${extraContext?extraContext+"\n":""}\nTask: ${userPrompt}`;
  const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,system:AI_SYSTEM})});
  const data=await r.json().catch(()=>({}));
  if(!r.ok){ throw new Error(typeof data.error==="string"?data.error:(data.error?.error?.message||"AI request failed")); }
  return (data.text||"").trim();
}

function syncNavWidth(){
  const shell=$(".shell");
  if(!shell)return;

  if(state.navCollapsed){
    document.documentElement.style.setProperty("--nav-w",NAV_COLLAPSED_W+"px");
    shell.style.gridTemplateColumns=NAV_COLLAPSED_W+"px 1fr";
  } else {
    try{
      const saved=parseInt(localStorage.getItem("pulse_nav_w"));
      const w=(saved>=180&&saved<=360)?saved:236;
      document.documentElement.style.setProperty("--nav-w",w+"px");
      shell.style.gridTemplateColumns=w+"px 1fr";
    }catch(_){
      document.documentElement.style.setProperty("--nav-w","236px");

    }
  }
}

function initNavResize(){
  const handle=$("#nav-resize");
  if(!handle)return;
  if(state.navCollapsed){handle.style.display="none";return;}
  const NAV_MIN=180,NAV_MAX=360;
  const shell=$(".shell");
  let startX,startW;
  handle.onmousedown=e=>{
    e.preventDefault();
    startX=e.clientX;
    startW=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--nav-w"))||236;
    handle.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(ev){
      const w=Math.min(NAV_MAX,Math.max(NAV_MIN,startW+(ev.clientX-startX)));
      document.documentElement.style.setProperty("--nav-w",w+"px");
      shell.style.gridTemplateColumns=w+"px 1fr";
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      const w=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--nav-w"))||236;
      try{localStorage.setItem("pulse_nav_w",w);}catch(_){}
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };
}

    hdr=["company_name","website","industry","size","location","owner","notes"];

      ["Widgets Co","","Manufacturing","51-200","Chicago IL","",""],
    ];

/* ---------------- Deals / Pipeline (kanban) ---------------- */
function renderDeals(c){
  if(!state._pipeOri)state._pipeOri=localStorage.getItem("pulse-pipe-ori")||"h";
  const ori=state._pipeOri;
  const D=live(state.deals);
  const open=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  c.innerHTML=`
    <div class="pagehead"><div><h1>Pipeline</h1><div class="sub">${open.length} open deals · ${moneyK(open.reduce((s,d)=>s+(+d.value||0),0))} in play</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="display:flex;gap:2px"><button class="btn sm${ori==="h"?" primary":""}" id="ori-h" title="Columns layout" style="padding:5px 8px">${I.cols}</button><button class="btn sm${ori==="v"?" primary":""}" id="ori-v" title="Rows layout" style="padding:5px 8px">${I.rows}</button></div>
        <button class="btn primary" id="newd">${I.plus}<span>New deal</span></button></div></div>
    <div class="board${ori==="v"?" vert":""}" id="board"></div>`;
  const board=$("#board");
  board.innerHTML=STAGES.map(s=>{
    const items=D.filter(d=>d.stage===s).sort((a,b)=>(a.order||0)-(b.order||0));
    const tot=items.reduce((a,d)=>a+(+d.value||0),0);
    return `<div class="kcol" data-stage="${esc(s)}">
      <div class="kcol-head"><span class="dot" style="background:${STAGE_COLOR[s]}"></span><span class="nm">${s}</span><span class="ct">${items.length}</span><span class="tot">${moneyK(tot)}</span></div>
      ${items.map(d=>dealCard(d)).join("")}</div>`;
  }).join("");
  // drag & drop
  board.querySelectorAll(".dealcard").forEach(card=>{
    card.draggable=true;
    card.ondragstart=e=>{e.dataTransfer.setData("text/plain",card.dataset.id);card.classList.add("dragging");};
    card.ondragend=()=>card.classList.remove("dragging");
    card.onclick=()=>dealForm(card.dataset.id);
  });
  board.querySelectorAll(".kcol").forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add("dragover");};
    col.ondragleave=()=>col.classList.remove("dragover");
    col.ondrop=e=>{e.preventDefault();col.classList.remove("dragover");
      const id=e.dataTransfer.getData("text/plain");const d=state.deals.find(x=>x.id===id);const ns=col.dataset.stage;
      if(d&&d.stage!==ns){ const old=d.stage; const patch={stage:ns,probability:STAGE_PROB[ns]}; if(ns==="Won"||ns==="Lost")patch.closedAt=Date.now();
        dbUpdate("deals",id,patch,true); logActivity("stage",`Deal “${d.name}” moved ${old} → ${ns}`,"deal",id); toast(`Moved to ${ns}`,"ok"); }
    };
  });
  $("#newd").onclick=()=>dealForm();
  $("#ori-h").onclick=()=>{state._pipeOri="h";try{localStorage.setItem("pulse-pipe-ori","h");}catch(_){}renderDeals(c);};
  $("#ori-v").onclick=()=>{state._pipeOri="v";try{localStorage.setItem("pulse-pipe-ori","v");}catch(_){}renderDeals(c);};
}
function dealCard(d){

    <div class="dn">${esc(d.name)}</div>

    <div class="dfoot"><span class="dval">${money(d.value)}</span><span class="prio ${d.priority||"low"}">${esc(d.priority||"low")}</span></div>

/* ---------------- Tasks ---------------- */
function renderTasks(c){
  const T=live(state.tasks);
  const filters={today:"Today",overdue:"Overdue",open:"Open",done:"Completed",all:"All"};
  if(!state._tf)state._tf="open";
  c.innerHTML=`
    <div class="pagehead"><div><h1>Tasks</h1><div class="sub">${T.filter(t=>t.status!=="done").length} open · ${T.filter(t=>t.status!=="done"&&isOverdue(t.due)).length} overdue</div></div>
      <button class="btn primary" id="newt">${I.plus}<span>New task</span></button></div>
    <div class="toolbar">${Object.entries(filters).map(([k,v])=>`<button class="btn sm ${state._tf===k?"primary":""}" data-tf="${k}">${v}</button>`).join("")}</div>
    <div class="card tablecard" id="ttable"></div>`;
  const draw=()=>{
    let rows=T.slice().sort((a,b)=>(a.due||9e15)-(b.due||9e15));
    const f=state._tf;
    if(f==="today")rows=rows.filter(t=>t.status!=="done"&&isToday(t.due));
    else if(f==="overdue")rows=rows.filter(t=>t.status!=="done"&&isOverdue(t.due));
    else if(f==="open")rows=rows.filter(t=>t.status!=="done");
    else if(f==="done")rows=rows.filter(t=>t.status==="done");
    $("#ttable").innerHTML=rows.length?`<table><tbody>
      ${rows.map(t=>{const rel=relLabel(t);const od=t.status!=="done"&&isOverdue(t.due);
        return `<tr data-id="${t.id}"><td style="width:40px"><input type="checkbox" data-done="${t.id}" ${t.status==="done"?"checked":""} style="width:18px;height:18px;cursor:pointer;accent-color:var(--accent)"></td>
        <td><div style="font-weight:500;${t.status==="done"?"text-decoration:line-through;color:var(--faint)":""}">${esc(t.title)}</div>${rel?`<div class="faint" style="font-size:11.5px">${esc(rel)}</div>`:""}</td>
        <td><span class="prio ${t.priority||"low"}">${esc(t.priority||"low")}</span></td>
        <td class="${od?"":"muted"}" style="${od?"color:var(--danger);font-weight:600":""}">${t.due?fmtDate(t.due):"—"}</td>
        <td>${t.owner?ava(t.owner,24):""}</td>
        <td><div class="rowact"><button class="btn ghost sm" data-edit="${t.id}">${I.edit}</button></div></td></tr>`;}).join("")}
      </tbody></table>`:emptyState("check","Nothing here","You're all caught up for this view.","New task","newt2");
    $("#ttable").querySelectorAll("[data-done]").forEach(cb=>cb.onclick=e=>{e.stopPropagation();const t=state.tasks.find(x=>x.id===cb.dataset.done);
      dbUpdate("tasks",cb.dataset.done,{status:cb.checked?"done":"open"},true); if(cb.checked)logActivity("task",`Completed task “${t?.title||""}”`,t?.relatedType,t?.relatedId); draw();});
    $("#ttable").querySelectorAll("[data-edit]").forEach(b=>b.onclick=e=>{e.stopPropagation();taskForm(b.dataset.edit);});
    $("#ttable").querySelectorAll("tbody tr").forEach(tr=>tr.onclick=e=>{if(e.target.closest("[data-done]")||e.target.closest("[data-edit]"))return;taskForm(tr.dataset.id);});
    const n2=$("#newt2");if(n2)n2.onclick=()=>taskForm();
  };
  c.querySelectorAll("[data-tf]").forEach(b=>b.onclick=()=>{state._tf=b.dataset.tf;renderTasks(c);});
  $("#newt").onclick=()=>taskForm();draw();
}
function relLabel(t){ if(!t.relatedId)return"";
  if(t.relatedType==="deal"){const d=state.deals.find(x=>x.id===t.relatedId);return d?"Deal · "+d.name:"";}
  if(t.relatedType==="contact"){const x=contactById(t.relatedId);return x?"Contact · "+contactName(x):"";}
  if(t.relatedType==="company"){const x=companyById(t.relatedId);return x?"Company · "+x.name:"";}
  return"";}

/* ---------------- Analytics ---------------- */
function renderAnalytics(c){
  const D=live(state.deals);
  const won=D.filter(d=>d.stage==="Won"),lost=D.filter(d=>d.stage==="Lost");
  const wonVal=won.reduce((s,d)=>s+(+d.value||0),0);
  const winRate=(won.length+lost.length)?Math.round(won.length/(won.length+lost.length)*100):0;
  const avg=won.length?Math.round(wonVal/won.length):0;
  // revenue by month (last 6) from closedAt of won deals
  const months=[];const now=new Date();now.setDate(1);
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:d.getFullYear()+"-"+d.getMonth(),label:d.toLocaleDateString("en-US",{month:"short"}),val:0});}
  won.forEach(d=>{const t=d.closedAt||d.updatedAt;const dt=new Date(t);const k=dt.getFullYear()+"-"+dt.getMonth();const m=months.find(x=>x.key===k);if(m)m.val+=(+d.value||0);});
  const maxM=Math.max(1,...months.map(m=>m.val));
  // top sources
  const srcMap={};live(state.contacts).forEach(x=>{const s=x.source||"Unknown";srcMap[s]=(srcMap[s]||0)+1;});
  const srcs=Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,6);const maxS=Math.max(1,...srcs.map(s=>s[1]));
  // rep performance
  const reps={};won.forEach(d=>{const o=d.owner||"Unassigned";reps[o]=reps[o]||{won:0,val:0};reps[o].won++;reps[o].val+=(+d.value||0);});
  const repRows=Object.entries(reps).sort((a,b)=>b[1].val-a[1].val);

  c.innerHTML=`
    <div class="pagehead"><div><h1>Analytics</h1><div class="sub">Performance across your pipeline</div></div></div>
    <div class="stats">
      <div class="card stat"><div class="lbl"><span class="ic">${I.dollar}</span>Revenue won</div><div class="val">${moneyK(wonVal)}</div></div>
      <div class="card stat"><div class="lbl"><span class="ic">${I.trophy}</span>Win rate</div><div class="val">${winRate}%</div></div>
      <div class="card stat"><div class="lbl"><span class="ic">${I.bar}</span>Avg deal size</div><div class="val">${moneyK(avg)}</div></div>
      <div class="card stat"><div class="lbl"><span class="ic">${I.check}</span>Deals won</div><div class="val">${won.length}</div></div>
    </div>
    <div class="grid2">
      <div class="card panel"><div class="panel-head"><h2>Revenue by month</h2></div>
        <div style="display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:10px">
          ${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end">
            <div class="faint" style="font-size:11px">${m.val?moneyK(m.val):""}</div>
            <div style="width:100%;max-width:46px;height:${Math.max(2,m.val/maxM*130)}px;background:linear-gradient(180deg,var(--accent),var(--accent-2));border-radius:7px 7px 0 0;transition:height .4s"></div>
            <div class="muted" style="font-size:11.5px">${m.label}</div></div>`).join("")}
        </div></div>
      <div class="card panel"><div class="panel-head"><h2>Top lead sources</h2></div>
        ${srcs.length?srcs.map(([s,n])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${esc(s)}</span><span class="muted">${n}</span></div><div style="height:7px;background:var(--surface-2);border-radius:5px"><div style="height:100%;width:${n/maxS*100}%;background:var(--accent);border-radius:5px"></div></div></div>`).join(""):emptyMini("No data","Add contacts with lead sources.")}</div>
    </div>
    <div class="card panel" style="margin-top:14px"><div class="panel-head"><h2>Rep performance</h2></div>
      ${repRows.length?`<table><thead><tr><th>Rep</th><th>Deals won</th><th>Revenue</th></tr></thead><tbody>
        ${repRows.map(([o,r])=>`<tr style="cursor:default"><td><div class="cellname">${ava(o,26)}${esc(o)}</div></td><td>${r.won}</td><td style="font-weight:600">${money(r.val)}</td></tr>`).join("")}</tbody></table>`:emptyMini("No closed deals yet","Win some deals to see rep performance.")}</div>`;
}

function field(id,label,opts={}){
  const v=opts.value!=null?String(opts.value):"";
  if(opts.type==="select")return `<div class="field"><label>${esc(label)}</label><select id="${id}">${opts.options.map(o=>`<option value="${esc(o.v!=null?o.v:o)}" ${(o.v!=null?o.v:o)==v?"selected":""}>${esc(o.l!=null?o.l:o)}</option>`).join("")}</select></div>`;
  if(opts.type==="textarea")return `<div class="field"><label>${esc(label)}</label><textarea id="${id}" placeholder="${esc(opts.ph||"")}">${esc(v)}</textarea></div>`;
  return `<div class="field"><label>${esc(label)}</label><input id="${id}" type="${opts.type||"text"}" placeholder="${esc(opts.ph||"")}" value="${esc(v)}"></div>`;
}

==================================================================== */
function renderAI(){
  const p=$("#aipanel");if(!p)return;
  const suggestions=["Who should I call today?","Summarize this week's performance","Which deals are at risk?","Draft a follow-up for my top deal"];
  p.className="ai-panel"+(state.aiOpen?" show":"");
  const _aiW=parseInt(localStorage.getItem("pulse_ai_panel_w"));
  if(_aiW>=320&&_aiW<=900)p.style.width=_aiW+"px";
  p.innerHTML=`<div class="ai-resize" id="ai-resize"></div><div class="ai-head"><span class="logo">${I.spark}</span><div style="flex:1"><h2>PulseAI</h2><div class="sub">Scoped to your workspace</div></div><button class="iconbtn" id="aiclose">${I.x}</button></div>
    <div class="ai-log" id="ailog">${state.aiLog.length?state.aiLog.map(m=>`<div class="ai-msg ${m.role}">${m.role==="bot"?esc(m.text).replace(/\n/g,"<br>"):esc(m.text)}</div>`).join(""):
      `<div class="ai-msg bot">Hi ${esc((state.user?.name||"there").split(" ")[0])} 👋 I can summarize contacts and deals, recommend who to call, draft emails, and spot risks — using only your workspace data. Ask me anything.</div>
       <div class="ai-suggest">${suggestions.map(s=>`<button data-sug="${esc(s)}">${esc(s)}</button>`).join("")}</div>`}</div>
    <div class="ai-input"><textarea id="aitext" rows="1" placeholder="Ask PulseAI…"></textarea><button class="ai-send" id="aisend">${I.send}</button></div>
    ${fbReady?"":'<div class="ai-note">Add ANTHROPIC_API_KEY in Vercel to enable live AI.</div>'}`;
  $("#aiclose").onclick=closeAI;
  const ta=$("#aitext");
  ta.oninput=()=>{ta.style.height="auto";ta.style.height=Math.min(120,ta.scrollHeight)+"px";};
  const send=async()=>{const q=ta.value.trim();if(!q)return;
    state.aiLog.push({role:"user",text:q});state.aiLog.push({role:"bot",text:"…"});renderAI();
    const log=$("#ailog");log.scrollTop=log.scrollHeight;
    try{const t=await askAI(q);state.aiLog[state.aiLog.length-1]={role:"bot",text:t};}
    catch(e){state.aiLog[state.aiLog.length-1]={role:"bot",text:"⚠️ "+e.message};}
    renderAI();$("#ailog").scrollTop=99999;};
  $("#aisend").onclick=send;
  ta.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  p.querySelectorAll("[data-sug]").forEach(b=>b.onclick=()=>{ta.value=b.dataset.sug;send();});
  const log=$("#ailog");if(log)log.scrollTop=log.scrollHeight;
  initAIPanelResize();
}
function initAIPanelResize(){
  const handle=$("#ai-resize");const panel=$("#aipanel");if(!handle||!panel)return;
  const AI_MIN=320,AI_MAX=900;
  let startX,startW;
  handle.onmousedown=e=>{
    e.preventDefault();
    startX=e.clientX;
    startW=panel.offsetWidth;
    handle.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(ev){
      const w=Math.min(AI_MAX,Math.max(AI_MIN,startW+(startX-ev.clientX)));
      panel.style.width=w+"px";
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      try{localStorage.setItem("pulse_ai_panel_w",panel.offsetWidth);}catch(_){}

function openCmdk(){
  state.cmdk=true;const box=$("#cmdk");box.classList.add("show");
  box.innerHTML=`<div class="cmdk-box"><div class="cmdk-in">${I.search}<input id="cmdin" placeholder="Search or jump to…"></div><div class="cmdk-results" id="cmdres"></div></div>`;
  box.onclick=e=>{if(e.target===box)closeCmdk();};
  const inp=$("#cmdin");let sel=0,items=[];
  const build=q=>{
    q=q.toLowerCase();const res=[];
    const pages=[["dashboard","Dashboard",I.grid],["contacts","Contacts",I.users],["companies","Companies",I.building],["deals","Pipeline",I.trello],["tasks","Tasks",I.check],["analytics","Analytics",I.bar],["settings","Settings",I.cog]];
    pages.filter(p=>!q||p[1].toLowerCase().includes(q)).forEach(p=>res.push({grp:"Navigate",ic:p[2],label:p[1],sub:"Go to "+p[1],act:()=>{state.page=p[0];state.detail=null;render();}}));
    if(q){
      live(state.contacts).filter(c=>(contactName(c)+(c.email||"")).toLowerCase().includes(q)).slice(0,5).forEach(c=>res.push({grp:"Contacts",ic:I.users,label:contactName(c),sub:companyById(c.companyId)?.name||c.email||"",act:()=>{state.detail={type:"contact",id:c.id};render();}}));
      live(state.companies).filter(c=>c.name.toLowerCase().includes(q)).slice(0,5).forEach(c=>res.push({grp:"Companies",ic:I.building,label:c.name,sub:c.industry||"",act:()=>{state.detail={type:"company",id:c.id};render();}}));
      live(state.deals).filter(d=>d.name.toLowerCase().includes(q)).slice(0,5).forEach(d=>res.push({grp:"Deals",ic:I.dollar,label:d.name,sub:d.stage+" · "+money(d.value),act:()=>{state.page="deals";state.detail=null;render();setTimeout(()=>dealForm(d.id),100);}}));
    }
    items=res;sel=0;paint(q);
  };
  const paint=q=>{const r=$("#cmdres");if(!items.length){r.innerHTML=`<div class="cmdk-empty">No results for “${esc(q)}”</div>`;return;}
    let html="",lastGrp="";items.forEach((it,i)=>{if(it.grp!==lastGrp){html+=`<div class="cmdk-grp">${esc(it.grp)}</div>`;lastGrp=it.grp;}
      html+=`<div class="cmdk-item ${i===sel?"sel":""}" data-i="${i}"><span class="ic">${it.ic}</span><div><div>${esc(it.label)}</div>${it.sub?`<div class="sub">${esc(it.sub)}</div>`:""}</div></div>`;});
    r.innerHTML=html;r.querySelectorAll("[data-i]").forEach(el=>el.onclick=()=>{closeCmdk();items[+el.dataset.i].act();});};
  inp.oninput=()=>build(inp.value);
  inp.onkeydown=e=>{if(e.key==="ArrowDown"){e.preventDefault();sel=Math.min(items.length-1,sel+1);paint(inp.value);}
    else if(e.key==="ArrowUp"){e.preventDefault();sel=Math.max(0,sel-1);paint(inp.value);}
    else if(e.key==="Enter"){if(items[sel]){closeCmdk();items[sel].act();}}
    else if(e.key==="Escape")closeCmdk();};
  build("");setTimeout(()=>inp.focus(),60);
}
function closeCmdk(){state.cmdk=false;$("#cmdk").classList.remove("show");}
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();state.user&&(state.cmdk?closeCmdk():openCmdk());}
  if(e.key==="Escape"){closeDrawer();if(state.aiOpen)closeAI();if(state.cmdk)closeCmdk();}
});

      email:(fn+"."+ln).toLowerCase()+"@"+coName.toLowerCase().replace(/[^a-z0-9]+/g,"")+".com",
      phone:"(555) "+(100+Math.floor(i/10))+"-"+(1000+(i%1000)),
      title:TITLES[i%TITLES.length],companyId:coRefs[i%coRefs.length].id,
      status:STATUSES[i%STATUSES.length],source:SOURCES[i%SOURCES.length],
      owner:reps[i%reps.length],tags:i%5===0?["priority"]:i%7===0?["newsletter"]:[],
      lastContacted:i%8===0?null:now-(i%21)*DAY,notes:"",
      ...audit(now-(i+1)*DAY)}]);
  });
  // Deals — 55 open (stages 0–4), 18 Won, 17 Lost
  dRefs.forEach((ref,i)=>{
    const stageIdx=i<55?i%5:i<73?5:6;
    const stage=STAGES[stageIdx];
    const closed=stage==="Won"||stage==="Lost";
    const daysAgo=closed?7+Math.round((i%358)):0;
    ops.push([ref,{
      name:CO_DATA[i%CO_DATA.length][0]+" — "+DEAL_NAMES[i%DEAL_NAMES.length],
      companyId:coRefs[i%coRefs.length].id,contactId:cRefs[i%500].id,
      value:VALUES[i%VALUES.length]+i*300,stage,probability:STAGE_PROB[stage],
      priority:PRIORITIES[i%3],source:SOURCES[i%SOURCES.length],owner:reps[i%reps.length],
      expectedClose:closed?now-daysAgo*DAY:now+(i%12-2)*7*DAY,
      closedAt:closed?now-daysAgo*DAY:null,notes:"",order:i,
      ...audit(now-(i+1)*2*DAY)}]);
  });

  // Write in chunks of 499 (Firestore batch limit is 500)
  try{
    for(let i=0;i<ops.length;i+=499){
      const b=writeBatch(db);
      ops.slice(i,i+499).forEach(([r,d])=>b.set(r,d));
      await b.commit();
      if(btn)btn.innerHTML=`<span class="spin"></span> ${Math.min(i+499,ops.length)}/${ops.length}…`;
    }
    toast(`Seeded ${CO_DATA.length} companies, 500 contacts, 90 deals`,"ok");
  }catch(e){
    toast("Seed failed: "+e.message,"err");
    if(btn){btn.disabled=false;btn.innerHTML=`${I.spark}Seed sample data`;}
    return;
  }
  if(btn){btn.disabled=false;btn.innerHTML=`${I.spark}Re-seed data`;}
}

/* ====================================================================
   BULK UPLOAD (CSV import for contacts & companies)
==================================================================== */
function parseCsv(text){
  const rows=[];
  text=text.replace(/\r\n?/g,"\n").trim();
  if(!text)return rows;
  let cur=[],field="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}
    else if(c==='"'){inQ=true;}
    else if(c===","){cur.push(field);field="";}
    else if(c==="\n"){cur.push(field);rows.push(cur);cur=[];field="";}
    else field+=c;
  }
  cur.push(field);
  if(cur.some(x=>x.trim()))rows.push(cur);
  return rows;
}

function bulkUploadModal(type){
  const isCon=type==="contacts";
  const TEMPLATE_HEADERS=isCon
    ?["firstName","lastName","email","phone","title","company","status","source","tags","notes"]
    :["name","website","industry","size","location","notes"];
  const PREVIEW_COLS=isCon
    ?["firstName","lastName","email","title","_companyName","status"]
    :["name","industry","size","location","website"];
  const PREVIEW_LABELS=isCon
    ?["First","Last","Email","Title","Company","Status"]
    :["Name","Industry","Size","Location","Website"];

  // flexible header normalizer: strip spaces/underscores, lowercase
  const norm=s=>String(s||"").toLowerCase().replace(/[\s_-]+/g,"");
  const HEADER_ALIASES=isCon?{
    firstname:["firstname","first","givenname"],
    lastname:["lastname","last","surname","familyname"],
    email:["email","emailaddress","mail"],
    phone:["phone","phonenumber","mobile","cell","telephone"],
    title:["title","jobtitle","role","position"],
    company:["company","companyname","organization","org","account"],
    status:["status","leadstatus","type"],
    source:["source","leadsource","origin"],
    tags:["tags","tag","labels"],
    notes:["notes","note","description","comment","comments"]
  }:{
    name:["name","companyname","company","organization","org"],
    website:["website","url","web","domain"],
    industry:["industry","sector","vertical"],
    size:["size","companysize","employees","headcount"],
    location:["location","city","address","hq","headquarters"],
    notes:["notes","note","description"]
  };

  const resolveHeaders=rawHeaders=>{
    const normed=rawHeaders.map(norm);
    const map={};
    Object.entries(HEADER_ALIASES).forEach(([field,aliases])=>{
      const i=normed.findIndex(h=>aliases.includes(h));
      if(i>=0)map[field]=i;
    });
    return map;
  };

  const overlay=document.createElement("div");
  overlay.className="bulk-modal";
  overlay.id="bulkmodal";
  document.body.appendChild(overlay);
  const close=()=>overlay.remove();
  overlay.onclick=e=>{if(e.target===overlay)close();};

  const steps=(active)=>`<div class="bulk-steps">
    <div class="step ${active===1?"on":""}"><span class="step-num">1</span>Upload</div>
    <div class="step-div"></div>
    <div class="step ${active===2?"on":""}"><span class="step-num">2</span>Preview</div>
    <div class="step-div"></div>
    <div class="step ${active===3?"on":""}"><span class="step-num">3</span>Done</div>
  </div>`;

  const label=isCon?"contacts":"companies";
  const templateCsv=TEMPLATE_HEADERS.join(",")+"\n";
  const templateUrl="data:text/csv;charset=utf-8,"+encodeURIComponent(templateCsv);

  // ---- Step 1: upload ----
  const step1=()=>{
    overlay.innerHTML=`<div class="bulk-modal-box">
      <div class="bulk-head"><h2>Import ${isCon?"Contacts":"Companies"}</h2><button class="iconbtn" id="bkX">${I.x}</button></div>
      <div class="bulk-body">
        ${steps(1)}
        <p style="font-size:13px;color:var(--muted);margin:0 0 14px">Upload a .csv file or paste CSV text below. Columns are matched flexibly — use the template if unsure. <a href="${templateUrl}" download="${label}_template.csv" style="color:var(--accent)">Download template</a></p>
        <div class="bulk-drop" id="bkDrop">
          ${I.note}
          <div style="font-weight:500;margin-top:10px">Drop a .csv file here or click to browse</div>
          <div style="font-size:12px;color:var(--faint);margin-top:4px">Expected columns: ${TEMPLATE_HEADERS.join(", ")}</div>
          <input type="file" id="bkFile" accept=".csv,text/csv" style="position:absolute;inset:0;opacity:0;cursor:pointer">
        </div>
        <div style="margin-top:14px">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px">Or paste CSV:</label>
          <textarea id="bkPaste" rows="7" placeholder="${TEMPLATE_HEADERS.join(",")}\n..." style="width:100%;font-family:monospace;font-size:12px;padding:10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);color:var(--ink);resize:vertical"></textarea>
        </div>
      </div>
      <div class="bulk-foot"><button class="btn" id="bkCancel">Cancel</button><button class="btn primary" id="bkNext">Preview →</button></div>
    </div>`;
    overlay.querySelector("#bkX").onclick=close;
    overlay.querySelector("#bkCancel").onclick=close;
    const fileInput=overlay.querySelector("#bkFile");
    const pasteArea=overlay.querySelector("#bkPaste");
    fileInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{pasteArea.value=ev.target.result;};r.readAsText(f);};
    const drop=overlay.querySelector("#bkDrop");
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("dragover");};
    drop.ondragleave=()=>drop.classList.remove("dragover");
    drop.ondrop=e=>{e.preventDefault();drop.classList.remove("dragover");const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>{pasteArea.value=ev.target.result;};r.readAsText(f);}};
    overlay.querySelector("#bkNext").onclick=()=>{
      const text=pasteArea.value.trim();
      if(!text){toast("Paste CSV or upload a file first","err");return;}
      const rows=parseCsv(text);
      if(rows.length<2){toast("Need at least a header row and one data row","err");return;}
      step2(rows);
    };
  };

  // ---- Step 2: preview ----
  const step2=(rows)=>{
    const rawHeaders=rows[0];
    const dataRows=rows.slice(1).filter(r=>r.some(c=>c.trim()));
    if(!dataRows.length){toast("No data rows found in CSV","err");step1();return;}
    const hmap=resolveHeaders(rawHeaders);
    const get=(r,field)=>{const i=hmap[field];return(i!=null&&r[i]!=null)?r[i].trim():"";};

    const errors=[];
    const mapped=dataRows.map((r,i)=>{
      if(isCon){
        const fn=get(r,"firstname"),ln=get(r,"lastname");
        if(!fn&&!ln){errors.push("Row "+(i+2)+": name required (firstName/lastName)");return null;}
        return{firstName:fn,lastName:ln,email:get(r,"email"),phone:get(r,"phone"),title:get(r,"title"),
          _companyName:get(r,"company"),status:get(r,"status")||"Lead",source:get(r,"source"),
          tags:get(r,"tags").split(",").map(t=>t.trim()).filter(Boolean),notes:get(r,"notes")};
      } else {
        const nm=get(r,"name");
        if(!nm){errors.push("Row "+(i+2)+": company name required");return null;}
        return{name:nm,website:get(r,"website"),industry:get(r,"industry"),size:get(r,"size"),location:get(r,"location"),notes:get(r,"notes")};
      }
    }).filter(Boolean);

    const rowCount=mapped.length;
    const errWarn=errors.length?`<div style="background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);border-radius:var(--r-sm);padding:10px 14px;font-size:12.5px;color:var(--warn);margin-bottom:12px">${errors.length} row(s) skipped — ${errors.slice(0,3).map(esc).join("; ")}${errors.length>3?` (+${errors.length-3} more)`:""}</div>`:"";

    const tableRows=mapped.slice(0,100).map(r=>`<tr style="border-bottom:1px solid var(--line)">${PREVIEW_COLS.map(col=>`<td style="padding:6px 10px;font-size:12px;color:var(--muted);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(r[col]||"")}</td>`).join("")}</tr>`).join("");
    const moreRow=mapped.length>100?`<tr><td colspan="${PREVIEW_COLS.length}" style="padding:8px 10px;font-size:11.5px;color:var(--faint)">…and ${mapped.length-100} more rows</td></tr>`:"";

    overlay.innerHTML=`<div class="bulk-modal-box">
      <div class="bulk-head"><h2>Preview — ${rowCount} ${label} ready to import</h2><button class="iconbtn" id="bkX">${I.x}</button></div>
      <div class="bulk-body">
        ${steps(2)}
        ${errWarn}
        ${rowCount===0?`<div style="text-align:center;padding:30px;color:var(--faint)">No valid rows to import.</div>`:`
        <div style="overflow-x:auto;max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-sm)">
          <table style="width:100%;border-collapse:collapse;font-size:12.5px">
            <thead style="position:sticky;top:0;background:var(--surface);z-index:1">
              <tr>${PREVIEW_LABELS.map(l=>`<th style="text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap;font-size:12px">${esc(l)}</th>`).join("")}</tr>
            </thead>
            <tbody>${tableRows}${moreRow}</tbody>
          </table>
        </div>`}
      </div>
      <div class="bulk-foot">
        <button class="btn" id="bkBack">← Back</button>
        <button class="btn primary" id="bkImport" ${rowCount===0?"disabled":""}>Import ${rowCount} ${isCon?"contact":(rowCount===1?"company":"companies")}${isCon&&rowCount!==1?"s":""}</button>
      </div>
    </div>`;
    overlay.querySelector("#bkX").onclick=close;
    overlay.querySelector("#bkBack").onclick=()=>{overlay.innerHTML="";step1();};
    if(rowCount>0){
      overlay.querySelector("#bkImport").onclick=async()=>{
        const btn=overlay.querySelector("#bkImport");
        btn.disabled=true;btn.innerHTML=`<span class="spin"></span> Importing…`;
        let ok=0,fail=0;
        for(const row of mapped){
          try{
            let data;
            if(isCon){
              let companyId=null;
              if(row._companyName){const co=live(state.companies).find(c=>c.name.toLowerCase()===row._companyName.toLowerCase());companyId=co?co.id:null;}
              data={firstName:row.firstName,lastName:row.lastName,email:row.email,phone:row.phone,title:row.title,
                companyId,status:row.status,source:row.source,tags:row.tags,notes:row.notes};
            } else {
              data={name:row.name,website:row.website,industry:row.industry,size:row.size,location:row.location,notes:row.notes};
            }
            await dbAdd(type,data,true);
            ok++;
          }catch(e){fail++;}
        }
        toast(`Imported ${ok} ${label}${fail?` (${fail} failed)`:""}`,ok>0?"ok":"err");
        if(ok>0)logActivity("contact",`Bulk imported ${ok} ${label}`,"","");
        close();render();
      };
    }
  };

  step1();
}
</script>
