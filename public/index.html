<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCRM</title>
<link rel="icon" type="image/png" href="/mbi-logo.png">
<link rel="apple-touch-icon" href="/mbi-logo.png">
<!--
  ============================================================
  PulseCRM — hosted build (Firebase Firestore + Claude API)
  ============================================================
  Single vanilla-HTML app. No build step, no bundler. Hosted on Vercel.
  It will NOT run inside a sandboxed preview (Firebase + external calls
  are blocked there) — that's expected. Deploy it to see it live.

  SETUP (three things, then host):

  1) FIREBASE
     - console.firebase.google.com → create project
     - Build → Firestore Database → Create (start in TEST mode)
     - Build → Authentication → Sign-in method → enable Google
     - Project settings → Your apps → Web app → copy config
     - Paste it into firebaseConfig below
     - Until configured, the app runs on in-memory DEMO data so you can
       explore the whole UI. Writes won't persist until Firebase is set.

  2) AI PROXY (Summaries, next-best-action, email drafts, assistant)
     - You can't call Anthropic from the browser, so api/claude.js holds
       ANTHROPIC_API_KEY server-side. Contract: POST {prompt, system} → {text}.
     - AI_ENDPOINT below points at it (same-origin, co-located on Vercel).

  3) HOST
     - Deploy the repo to Vercel. Share the URL.
  ============================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap');
  :root{
    --ink:#101322; --muted:#5b6172; --faint:#959bab; --line:#e6e8ef;
    --surface:#ffffff; --surface-2:#f7f8fb; --canvas:#f1f2f6;
    --accent:#5b5bf0; --accent-2:#8b5cf6; --accent-soft:#eeeefe; --accent-ink:#4a3fd6;
    --ok:#16a34a; --ok-soft:#e7f7ee; --warn:#d97706; --warn-soft:#fdf2e0; --danger:#dc2626; --danger-soft:#fde8e8;
    --shadow:0 1px 2px rgba(16,19,34,.04),0 4px 16px rgba(16,19,34,.05);
    --shadow-lg:0 8px 40px rgba(16,19,34,.16);
    --r:14px; --r-sm:10px;
    --topbar-h:64px;
    --page-top-h:0px;
  }
  [data-theme="dark"]{
    --ink:#eef0f6; --muted:#a4abbd; --faint:#6b7180; --line:#262a38;
    --surface:#161924; --surface-2:#1c2030; --canvas:#0e1019;
    --accent:#7b7bff; --accent-2:#a78bfa; --accent-soft:#1e1f3a; --accent-ink:#b9b9ff;
    --ok:#34d399; --ok-soft:#0f2a20; --warn:#fbbf24; --warn-soft:#2a2110; --danger:#f87171; --danger-soft:#2a1414;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 24px rgba(0,0,0,.35);
    --shadow-lg:0 12px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;}
  button,select,textarea,input{font-family:inherit;color:inherit;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;margin:0;}
  a{color:inherit;}
  ::selection{background:var(--accent-soft);}
  .spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;opacity:.7;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* ---------- shell ---------- */
  :root{--nav-w:236px;--nav-collapsed-w:54px;}
  .shell{display:grid;grid-template-columns:var(--nav-w) 1fr;min-height:100vh;transition:grid-template-columns .2s ease;}
  .sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:hidden;transition:padding .2s ease,width .2s ease;}
  .nav-resize{position:absolute;top:0;right:0;width:5px;height:100%;cursor:col-resize;z-index:10;background:transparent;transition:background .15s;}
  .nav-resize:hover,.nav-resize.dragging{background:var(--accent);opacity:.35;border-radius:0;}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;overflow:hidden;}
  .brand .logo{width:30px;height:30px;object-fit:contain;flex:none;}
  .brand b{font-size:18px;font-weight:600;white-space:nowrap;transition:opacity .15s,width .2s;}
  .nav{display:flex;flex-direction:column;gap:3px;}
  .nav button{display:flex;align-items:center;gap:11px;border:none;background:transparent;color:var(--muted);font-size:13.5px;font-weight:500;padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:background .15s,color .15s,box-shadow .15s,padding .2s,justify-content .2s;width:100%;box-shadow:inset 3px 0 0 transparent;}
  .nav button:hover{background:var(--surface-2);color:var(--ink);}
  .nav button:active{transform:scale(.985);}
  .nav button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:600;box-shadow:inset 3px 0 0 var(--accent);}
  .nav button svg{width:17px;height:17px;flex:none;}
  .nav button span{white-space:nowrap;overflow:hidden;transition:opacity .15s,max-width .2s;max-width:200px;}
  .nav .badge{margin-left:auto;font-size:10.5px;font-weight:600;background:var(--danger-soft);color:var(--danger);border-radius:20px;padding:1px 7px;white-space:nowrap;}
  .nav-sec{font-size:10.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:14px 11px 6px;white-space:nowrap;overflow:hidden;transition:opacity .15s,max-height .2s;max-height:40px;}
  .side-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;overflow:hidden;}
  .me{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--r-sm);overflow:hidden;}
  .me .ava{width:30px;height:30px;}
  .me .info{min-width:0;flex:1;overflow:hidden;transition:opacity .15s,max-width .2s;max-width:200px;}
  .me .info .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .me .info .em{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-collapse-btn{flex:none;border:none;background:transparent;color:var(--faint);cursor:pointer;padding:5px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:background .14s,color .14s;margin-left:auto;}
  .nav-collapse-btn:hover{background:var(--surface-2);color:var(--ink);}
  .nav-collapse-btn svg{width:16px;height:16px;flex:none;transition:transform .2s;}
  /* collapsed sidebar — icon-only mode */
  .sidebar.collapsed{padding:18px 8px;}
  .sidebar.collapsed .brand b,.sidebar.collapsed .nav-sec,.sidebar.collapsed .nav button span,.sidebar.collapsed .me .info,.sidebar.collapsed [data-action=signout]{opacity:0;max-width:0;max-height:0;pointer-events:none;}
  .sidebar.collapsed .nav button{justify-content:center;padding:9px 0;box-shadow:none!important;}
  .sidebar.collapsed .nav-collapse-btn svg{transform:rotate(180deg);}
  .sidebar.collapsed .nav .badge{display:none;}
  /* keep expand button accessible when collapsed */
  .sidebar.collapsed .brand{padding-left:0;padding-right:0;justify-content:center;}
  .sidebar.collapsed .brand .logo{display:none;}
  .sidebar.collapsed .nav-collapse-btn{margin-left:0;}
  /* fast tooltip in collapsed icon-only mode */
  .sidebar.collapsed [data-nav]{position:relative;}
  .sidebar.collapsed [data-nav]::after{content:attr(data-label);position:fixed;left:calc(var(--nav-collapsed-w) + 8px);background:var(--ink);color:var(--canvas);font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .08s .04s;z-index:200;transform:translateY(-50%);}
  .sidebar.collapsed [data-nav]:hover::after{opacity:1;}

  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:14px 26px;background:color-mix(in srgb,var(--canvas) 82%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;color:var(--faint);font-size:13px;cursor:pointer;transition:border-color .14s;white-space:nowrap;overflow:hidden;height:36px;box-sizing:border-box;}
  .search:hover{border-color:var(--accent);}
  .search svg{width:16px;height:16px;flex:none;}
  .search kbd{margin-left:auto;font-family:inherit;font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--muted);}
  .topbar .sp{flex:1;}
  .iconbtn{width:36px;height:36px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .14s,color .14s;}
  .iconbtn:hover{background:var(--surface-2);color:var(--ink);}
  .iconbtn svg{width:17px;height:17px;}
  .content{padding:26px;}
  .content.page-in{animation:fadein .2s ease;}

  /* ---------- buttons ---------- */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:var(--r-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .14s,transform .05s,border-color .14s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn:hover{background:var(--surface-2);}
  .btn:active{transform:scale(.99);}
  .btn svg{width:15px;height:15px;}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(91,91,240,.32);}
  .btn.primary:hover{filter:brightness(1.06);background:linear-gradient(135deg,var(--accent),var(--accent-2));}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);}
  .btn.ghost:hover{background:var(--surface-2);color:var(--ink);}
  .btn.danger{color:var(--danger);}
  .btn.danger:hover{background:var(--danger-soft);}
  .btn:disabled{opacity:.5;cursor:default;}

  /* ---------- generic bits ---------- */
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
  .pagehead h1{font-size:24px;font-weight:600;}
  .pagehead .sub{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .page-top{position:sticky;top:var(--topbar-h);z-index:15;background:var(--canvas);padding-bottom:8px;}
  .page-top>.pagehead{margin-bottom:0;}
  .ava{border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;flex:none;}
  .avas{display:flex;}
  .avas .ava{border:2px solid var(--surface);margin-left:-7px;}
  .avas .ava:first-child{margin-left:0;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--line);white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;}
  .tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:7px;background:var(--accent-soft);color:var(--accent-ink);}
  .muted{color:var(--muted);} .faint{color:var(--faint);}

  /* ---------- cards / grid ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:18px;}
  .stat{padding:16px 18px;position:relative;overflow:hidden;}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px;}
  .stat .lbl .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent-ink);}
  .stat .lbl .ic svg{width:15px;height:15px;}
  .stat .val{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:600;margin-top:10px;letter-spacing:-.02em;}
  .stat .delta{font-size:12px;margin-top:3px;color:var(--muted);}
  .stat .delta.up{color:var(--ok);} .stat .delta.down{color:var(--danger);}
  .stat[data-dash-nav]{cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .stat[data-dash-nav]:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
  .panel{padding:18px 20px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .panel-head h2{font-size:15px;font-weight:600;}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start;}
  @media(max-width:980px){.grid2{grid-template-columns:1fr;}}

  /* ---------- table ---------- */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .input{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;font-size:13px;}
  .input:focus{outline:none;border-color:var(--accent);}
  .field-search{flex:1;max-width:320px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 12px;}
  .field-search input{border:none;background:none;padding:9px 0;font-size:13px;width:100%;}
  .field-search input:focus{outline:none;}
  .field-search svg{width:15px;height:15px;color:var(--faint);flex:none;}
  table{width:100%;border-collapse:collapse;}
  /* Own scroll region: wide tables scroll horizontally instead of clipping,
     and the header stays pinned to the top of the card (works with the scroll
     container, unlike page-level sticky which needs a non-scrolling ancestor). */
  .tablecard{overflow:auto;max-height:max(240px,calc(100vh - var(--topbar-h,64px) - var(--page-top-h,0px) - 50px));margin-bottom:-12px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .tablecard::-webkit-scrollbar,.xf-list::-webkit-scrollbar,.sdd-opts::-webkit-scrollbar{width:8px;height:8px;}
  .tablecard::-webkit-scrollbar-thumb,.xf-list::-webkit-scrollbar-thumb,.sdd-opts::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  .tablecard::-webkit-scrollbar-thumb:hover,.xf-list::-webkit-scrollbar-thumb:hover,.sdd-opts::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:padding-box;}
  .tablecard::-webkit-scrollbar-track,.tablecard::-webkit-scrollbar-corner{background:transparent;}
  .xf-list,.sdd-opts{scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap;}
  .tablecard thead th{position:sticky;top:0;z-index:10;}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover{background:var(--surface-2);}
  .cellname{font-weight:600;display:flex;align-items:center;gap:10px;}
  .rowact{opacity:0;transition:opacity .12s;}
  tr:hover .rowact{opacity:1;}
  thead th.sortable{cursor:pointer;user-select:none;transition:color .13s;}
  thead th.sortable:hover{color:var(--ink);}
  thead th.sorted-asc,thead th.sorted-desc{color:var(--accent-ink);}
  .sort-ind{display:inline-block;margin-left:4px;font-size:9px;opacity:.3;vertical-align:middle;}
  thead th.sorted-asc .sort-ind::after{content:"↑";opacity:1;color:var(--accent);}
  thead th.sorted-desc .sort-ind::after{content:"↓";opacity:1;color:var(--accent);}
  thead th:not(.sorted-asc):not(.sorted-desc) .sort-ind::after{content:"↕";}
  thead th:has(.sdd){vertical-align:top;white-space:normal;position:relative;}
  .th-fd{display:inline-block;position:relative;vertical-align:middle;margin-left:4px;}
  .th-fd-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;cursor:pointer;color:var(--faint);transition:color .13s,background .13s;}
  .th-fd-btn svg{width:11px;height:11px;}
  .th-fd-btn:hover,.th-fd.open .th-fd-btn{color:var(--ink);background:rgba(0,0,0,.07);}
  .th-fd.active .th-fd-btn{color:var(--accent);}
  .th-fd-panel{display:none;position:absolute;top:calc(100% + 4px);right:0;min-width:190px;background:var(--surface);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-lg);z-index:250;padding:6px;}
  .th-fd.open .th-fd-panel{display:block;}
  .th-fd-inp{width:100%;border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:12px;background:var(--surface-2);color:var(--ink);outline:none;box-sizing:border-box;font-weight:400;text-transform:none;letter-spacing:0;}
  .th-fd-inp:focus{border-color:var(--accent);}
  .th-fd-inp::placeholder{color:var(--faint);}
  .sdd{display:block;width:100%;margin-top:5px;font-weight:400;text-transform:none;letter-spacing:0;}
  .sdd-val{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:3px 20px 3px 6px;font-size:11px;color:var(--ink);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border-color .13s;position:relative;user-select:none;}
  .sdd-val::after{content:"▾";position:absolute;right:5px;top:50%;transform:translateY(-50%);opacity:.5;font-size:9px;pointer-events:none;}
  .sdd.open .sdd-val{border-color:var(--accent);}
  .sdd-panel{display:none;position:absolute;top:calc(100% + 3px);left:0;min-width:140px;background:var(--surface);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-lg);z-index:200;padding:5px;}
  .sdd.open .sdd-panel{display:block;}
  .sdd-search{width:100%;border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:11px;background:var(--surface-2);color:var(--ink);outline:none;margin-bottom:3px;box-sizing:border-box;}
  .sdd-search:focus{border-color:var(--accent);}
  .sdd-opts{max-height:140px;overflow-y:auto;}
  .sdd-opt{padding:4px 8px;font-size:11.5px;border-radius:4px;cursor:pointer;white-space:nowrap;}
  .sdd-opt:hover{background:var(--surface-2);}
  .sdd-opt.sel{background:var(--accent-soft);color:var(--accent-ink);}
  .sdd-opt.hidden{display:none;}
  .msdd-hdr{display:flex;align-items:center;gap:6px;padding:2px 0 5px;border-bottom:1px solid var(--line);margin-bottom:3px;}
  .msdd-all{background:none;border:none;color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;padding:2px 5px;border-radius:3px;white-space:nowrap;}
  .msdd-all:hover{background:var(--accent-soft);}
  .sdd-opt-row{display:flex;align-items:center;gap:6px;pointer-events:none;}
  .sdd-opt input[type=checkbox]{width:12px;height:12px;accent-color:var(--accent);flex:none;}

  /* ---------- Excel-style column filter (xf) ---------- */
  .xf-panel{min-width:214px;max-width:280px;}
  .xf-cond{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
  .xf-op,.xf-a,.xf-b,.xf-search{width:100%;border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:12px;background:var(--surface-2);color:var(--ink);outline:none;box-sizing:border-box;font-weight:400;text-transform:none;letter-spacing:0;}
  .xf-op:focus,.xf-a:focus,.xf-b:focus,.xf-search:focus{border-color:var(--accent);}
  .xf-search{margin-bottom:4px;}
  .xf-list{max-height:190px;overflow-y:auto;border:1px solid var(--line);border-radius:4px;padding:3px;}
  .xf-opt{display:flex;align-items:center;gap:7px;padding:3px 5px;font-size:12px;border-radius:3px;cursor:pointer;white-space:nowrap;font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);}
  .xf-opt:hover{background:var(--surface-2);}
  .xf-opt input{width:13px;height:13px;accent-color:var(--accent);flex:none;margin:0;}
  .xf-opt span{overflow:hidden;text-overflow:ellipsis;}
  .xf-all{border-bottom:1px solid var(--line);margin-bottom:2px;font-weight:600;position:sticky;top:0;background:var(--surface);}
  .xf-actions{display:flex;gap:6px;margin-top:7px;}
  .xf-actions button{flex:1;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:5px;padding:5px;font-size:12px;font-weight:500;cursor:pointer;}
  .xf-actions .xf-apply{background:var(--accent);border-color:var(--accent);color:#fff;}
  .xf-actions button:hover{filter:brightness(.97);}
  .xf-note{font-size:10.5px;color:var(--faint);padding:5px 2px 0;line-height:1.4;}
  /* ---------- table pagination ---------- */
  .tpager{position:sticky;bottom:0;left:0;z-index:9;display:flex;align-items:center;gap:18px;padding:8px 14px;background:var(--surface);border-top:1px solid var(--line);font-size:12px;color:var(--muted);}
  .tpager-ctl{display:flex;align-items:center;gap:6px;}
  .tpager-btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;cursor:pointer;}
  .tpager-btn:hover:not(:disabled){background:var(--surface-2);}
  .tpager-btn:disabled{opacity:.4;cursor:default;}
  .tpager-page{padding:0 4px;white-space:nowrap;}
  .tpager-size{display:flex;align-items:center;gap:3px;}
  .tpager-per{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:6px;padding:3px 5px;font-size:12px;cursor:pointer;}

  /* ---------- kanban ---------- */
  .board{display:grid;grid-auto-flow:column;grid-auto-columns:280px;gap:13px;overflow-x:auto;padding-bottom:12px;align-items:start;scrollbar-width:thin;}
  .kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:10px;display:flex;flex-direction:column;gap:9px;min-height:120px;transition:background .12s,outline .12s;}
  .kcol.dragover{outline:2px dashed var(--accent);outline-offset:-3px;background:var(--accent-soft);}
  .kcol-head{display:flex;align-items:center;gap:8px;padding:2px 4px;}
  .kcol-head .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .kcol-head .nm{font-size:12.5px;font-weight:600;}
  .kcol-head .ct{font-size:11px;color:var(--faint);}
  .kcol-head .tot{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--muted);}
  .kcol-search{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:0 7px;height:26px;}
  .kcol-search input{border:none;background:none;font-size:11.5px;width:100%;outline:none;color:var(--ink);}
  .kcol-search input::placeholder{color:var(--faint);}
  .kcol-search svg{width:11px;height:11px;color:var(--faint);flex:none;}
  .dealcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;cursor:grab;box-shadow:var(--shadow);transition:box-shadow .12s,transform .05s;display:flex;flex-direction:column;gap:7px;}
  .dealcard:active{cursor:grabbing;}
  .dealcard.dragging{opacity:.4;}
  .dealcard:hover{box-shadow:var(--shadow-lg);}
  .dealcard .dn{font-size:13.5px;font-weight:600;line-height:1.3;}
  .dealcard .dco{font-size:11.5px;color:var(--muted);}
  .dealcard .dfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:1px;}
  .dealcard .dval{font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;}
  .prio{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 7px;border-radius:6px;}
  .prio.high{background:var(--danger-soft);color:var(--danger);}
  .prio.medium{background:var(--warn-soft);color:var(--warn);}
  .prio.low{background:var(--surface-2);color:var(--muted);}
  .od-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:7px;cursor:pointer;transition:background .15s;}
  .od-row:hover{background:var(--surface-2);}
  /* horizontal kanban — fill viewport, scrollbar always visible */
  .board:not(.vert){align-items:stretch;overflow-y:hidden;}
  .board:not(.vert) .kcol{overflow-y:auto;}
  /* vertical kanban — 1 row per stage: label/search on the left, cards scroll horizontally */
  .board-vert-wrap{overflow-x:hidden;width:100%;padding-bottom:12px;scrollbar-width:thin;}
  .board.vert{display:flex;flex-direction:column;gap:13px;overflow-x:hidden;padding-bottom:0;width:auto;min-width:0;}
  .board.vert .kcol{display:grid;grid-template-columns:140px minmax(0,1fr);grid-template-rows:auto auto;column-gap:0;row-gap:6px;align-items:start;min-height:auto;overflow:hidden;}
  .board.vert .kcol-head{grid-column:1;grid-row:1;flex-direction:column;align-items:flex-start;gap:4px;padding:2px 10px 2px 4px;}
  .board.vert .kcol-head .tot{margin-left:0;}
  .board.vert .kcol-search{grid-column:1;grid-row:2;display:flex;margin:0 10px 0 4px;}
  .board.vert .kcol-cards{grid-column:2;grid-row:1 / span 2;display:flex;flex-direction:row;flex-wrap:nowrap;gap:9px;align-self:stretch;overflow-x:auto;padding:2px 2px 8px 12px;border-left:2px solid var(--line);scrollbar-width:thin;}
  .board.vert .dealcard{width:200px;flex:none;}
  .dealcard mark{background:#fef08a;color:inherit;border-radius:2px;padding:0 1px;font-style:normal;}
  .kcol-empty{text-align:center;padding:18px 8px;color:var(--muted);font-size:12px;}

  /* ---------- timeline ---------- */
  .timeline{display:flex;flex-direction:column;gap:2px;}
  .tl-item{display:flex;gap:12px;padding:4px 0;}
  .tl-rail{display:flex;flex-direction:column;align-items:center;flex:none;}
  .tl-node{width:28px;height:28px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .tl-node svg{width:14px;height:14px;}
  .tl-line{flex:1;width:2px;background:var(--line);margin:3px 0;min-height:6px;}
  .tl-body{padding-bottom:14px;flex:1;min-width:0;}
  .tl-body .tx{font-size:13px;}
  .tl-body .mt{font-size:11.5px;color:var(--faint);margin-top:2px;}

  /* ---------- empty / skeleton ---------- */
  .empty{text-align:center;padding:54px 20px;}
  .empty .ill{width:54px;height:54px;border-radius:16px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .empty .ill svg{width:26px;height:26px;}
  .empty h3{font-size:16px;margin-bottom:5px;}
  .empty p{font-size:13px;color:var(--muted);margin:0 auto 16px;max-width:340px;}
  .skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--line) 37%,var(--surface-2) 63%);background-size:400% 100%;animation:sk 1.3s ease infinite;border-radius:7px;}
  @keyframes sk{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  /* ---------- drawer / modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(10,12,20,.42);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(520px,100vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:61;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.show{transform:none;}
  .drawer-resize{position:absolute;top:0;left:0;width:5px;height:100%;cursor:col-resize;z-index:10;background:transparent;transition:background .15s;}
  .drawer-resize:hover,.drawer-resize.dragging{background:var(--accent);opacity:.35;}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 22px;border-bottom:1px solid var(--line);}
  .drawer-head h2{font-size:17px;font-weight:600;}
  .drawer-body{padding:20px 22px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:13.5px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:70px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field-checks{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
  .field-check-item{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
  .field-check-item + label{font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--surface-2);color:var(--muted);border:1px solid var(--line);cursor:pointer;transition:background .12s,color .12s,border-color .12s;user-select:none;}
  .field-check-item:checked + label{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent);}

  /* detail header */
  .detail-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
  .detail-head .big-ava{width:60px;height:60px;border-radius:16px;font-size:22px;}
  .detail-head h1{font-size:22px;}
  .detail-head .meta{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:9px 16px;font-size:13px;}
  .kv dt{color:var(--faint);} .kv dd{margin:0;font-weight:500;}
  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:14px;padding:0;}
  .backlink:hover{color:var(--ink);}

  /* ---------- AI panel ---------- */
  .ai-fab{position:fixed;right:24px;bottom:24px;z-index:55;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 8px 28px rgba(91,91,240,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .ai-fab:hover{transform:scale(1.06);}
  .ai-fab svg{width:24px;height:24px;}
  .ai-panel{position:fixed;top:0;right:0;height:100vh;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:62;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .ai-panel.show{transform:none;}
  .ai-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);}
  .ai-head .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;}
  .ai-head .logo svg{width:17px;height:17px;}
  .ai-head h2{font-size:15px;font-weight:600;}
  .ai-head .sub{font-size:11px;color:var(--faint);}
  .ai-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
  .ai-msg{font-size:13px;line-height:1.55;white-space:pre-wrap;}
  .ai-msg.user{align-self:flex-end;background:var(--accent);color:#fff;padding:9px 13px;border-radius:14px 14px 3px 14px;max-width:85%;}
  .ai-msg.bot{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);padding:11px 14px;border-radius:14px 14px 14px 3px;max-width:92%;}
  .ai-suggest{display:flex;flex-wrap:wrap;gap:7px;}
  .ai-suggest button{font-size:12px;border:1px solid var(--line);background:var(--surface);border-radius:20px;padding:6px 12px;cursor:pointer;color:var(--muted);transition:all .12s;}
  .ai-suggest button:hover{border-color:var(--accent);color:var(--accent-ink);}
  .ai-input{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:9px;align-items:flex-end;}
  .ai-input textarea{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;resize:none;max-height:120px;}
  .ai-input textarea:focus{outline:none;border-color:var(--accent);}
  .ai-send{width:38px;height:38px;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
  .ai-send:disabled{opacity:.5;}
  .ai-note{font-size:11px;color:var(--faint);text-align:center;padding:0 16px 10px;}
  .ai-resize{position:absolute;top:0;left:0;width:5px;height:100%;cursor:col-resize;z-index:10;background:transparent;transition:background .15s;}
  .ai-resize:hover,.ai-resize.dragging{background:var(--accent);opacity:.35;}

  /* AI insight box (in detail pages) */
  .insight{background:linear-gradient(135deg,var(--accent-soft),transparent);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;}
  .insight .ih{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--accent-ink);margin-bottom:8px;}
  .insight .ih svg{width:15px;height:15px;}
  .insight .ic-body{font-size:13px;line-height:1.55;white-space:pre-wrap;color:var(--ink);}

  /* ---------- command palette ---------- */
  .cmdk{position:fixed;inset:0;z-index:70;display:none;align-items:flex-start;justify-content:center;padding-top:13vh;background:rgba(10,12,20,.5);backdrop-filter:blur(3px);}
  .cmdk.show{display:flex;}
  .cmdk-box{width:min(580px,92vw);background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-lg);overflow:hidden;animation:fadein .15s ease;}
  .cmdk-in{display:flex;align-items:center;gap:11px;padding:15px 18px;border-bottom:1px solid var(--line);}
  .cmdk-in svg{width:18px;height:18px;color:var(--faint);}
  .cmdk-in input{flex:1;border:none;background:none;font-size:15px;}
  .cmdk-in input:focus{outline:none;}
  .cmdk-results{max-height:54vh;overflow-y:auto;padding:8px;}
  .cmdk-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px;overflow:hidden;}
  .cmdk-item.sel,.cmdk-item:hover{background:var(--surface-2);}
  .cmdk-item .ic{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;flex:none;}
  .cmdk-item .ic svg{width:15px;height:15px;}
  .cmdk-item>div{min-width:0;overflow:hidden;}
  .cmdk-item>div>div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cmdk-item .sub{font-size:11.5px;color:var(--faint);}
  .cmdk-empty{padding:30px;text-align:center;color:var(--faint);font-size:13px;}
  .cmdk-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;padding:10px 12px 4px;}
  .cmdk-ai-item .ic{background:linear-gradient(135deg,var(--accent),var(--accent-2))!important;color:#fff!important;}
  .cmdk-ai-sug{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px 12px;}
  .cmdk-ai-sug button{font-size:12px;border:1px solid var(--line);background:var(--surface);border-radius:20px;padding:5px 11px;cursor:pointer;color:var(--muted);transition:all .12s;}
  .cmdk-ai-sug button:hover{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft);}

  /* ---------- toast ---------- */
  .toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{background:var(--ink);color:var(--canvas);font-size:13px;padding:10px 16px;border-radius:var(--r-sm);box-shadow:var(--shadow-lg);animation:fadein .2s ease;display:flex;align-items:center;gap:9px;}
  .toast.ok{background:var(--ok);color:#fff;} .toast.err{background:var(--danger);color:#fff;}

  /* setup / login */
  .setupwarn{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);color:var(--warn);border-radius:var(--r-sm);padding:10px 14px;font-size:12.5px;margin:0 26px;}
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 70% -10%,var(--accent-soft),transparent),var(--canvas);}
  .login-card{width:min(400px,100%);background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:34px;text-align:center;}
  .login-card .logo{width:56px;height:56px;object-fit:contain;display:block;margin:0 auto 16px;}
  .login-card h1{font-size:24px;margin-bottom:6px;}
  .login-card p{font-size:13.5px;color:var(--muted);margin:0 0 22px;}
  .gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);font-size:14px;font-weight:500;cursor:pointer;transition:background .14s;}
  .gbtn:hover{background:var(--surface-2);}

  @media(max-width:760px){
    .shell{grid-template-columns:1fr;}
    .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .2s;}
    .sidebar.show{transform:none;}
    .nav-resize{display:none;}
    .ai-resize{display:none;}
    .content{padding:18px 14px;}
    .topbar{padding:12px 14px;}
    .grid2{grid-template-columns:1fr;}
  }
  .menu-toggle{display:none;}
  @media(max-width:760px){.menu-toggle{display:flex;}}

  /* ---------- quote modal ---------- */
  .q-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .15s ease;}
  .q-box{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-lg);width:min(860px,100%);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
  .q-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
  .q-head h2{font-size:15px;font-family:'Space Grotesk',sans-serif;margin:0;}
  .q-scroll{flex:1;overflow-y:auto;}
  .q-doc{background:#fff;color:#111;font-family:'Inter',system-ui,sans-serif;padding:40px 44px;font-size:13.5px;line-height:1.65;}
  [data-theme=dark] .q-doc{background:#161924;color:#eef0f6;}
  .q-doc h1{font-size:26px;font-weight:700;margin:0 0 2px;font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;}
  .q-doc .qmeta{font-size:12px;color:#777;margin-bottom:28px;}
  [data-theme=dark] .q-doc .qmeta{color:#a4abbd;}
  .q-doc .qsec{margin-bottom:24px;}
  .q-doc .qsec h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:#999;margin:0 0 5px;}
  [data-theme=dark] .q-doc .qsec h3{color:#6b7180;}
  .q-doc .q2col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
  .qtable{width:100%;border-collapse:collapse;margin:12px 0;}
  .qtable th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;color:#888;padding:8px 10px;border-bottom:2px solid #e6e8ef;text-align:left;}
  [data-theme=dark] .qtable th{color:#6b7180;border-color:#262a38;}
  .qtable td{padding:9px 10px;border-bottom:1px solid #eee;font-size:13.5px;}
  [data-theme=dark] .qtable td{border-color:#1c2030;}
  .qtable td:last-child,.qtable th:last-child{text-align:right;}
  .qtotal{display:flex;justify-content:flex-end;gap:40px;border-top:2px solid #e6e8ef;padding-top:14px;margin-top:4px;}
  [data-theme=dark] .qtotal{border-color:#262a38;}
  .qtrow{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .qtrow .ql{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#888;}
  [data-theme=dark] .qtrow .ql{color:#6b7180;}
  .qtrow .qv{font-size:20px;font-weight:700;}
  .qtrow .qv.big{color:#5b5bf0;}
  .q-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
  .q-head h2 svg{width:15px;height:15px;flex:none;vertical-align:middle;}
  .cellname svg{width:15px;height:15px;flex:none;}
  .setupwarn svg{width:13px;height:13px;flex:none;vertical-align:middle;}
  .q-foot .faint svg{width:13px;height:13px;flex:none;vertical-align:middle;}
  /* deal form product lines */
  .dlines{display:flex;flex-direction:column;gap:6px;}
  .dline{display:grid;grid-template-columns:1fr 70px 110px 30px;gap:6px;align-items:center;}
  .dline input{border:1px solid var(--line);border-radius:var(--r-sm);padding:7px 9px;background:var(--surface-2);font-size:13px;width:100%;color:var(--ink);}
  .dline input:focus{outline:2px solid var(--accent);outline-offset:-1px;background:var(--surface);}
  .dlrm{border:none;background:transparent;color:var(--faint);cursor:pointer;font-size:20px;padding:0;line-height:1;border-radius:var(--r-sm);width:30px;height:30px;display:flex;align-items:center;justify-content:center;}
  .dlrm:hover{color:var(--danger);background:var(--danger-soft);}

  /* ---------- quote builder ---------- */
  .qb-box{width:min(1000px,100%);}
  .qb-grid{flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 320px;min-height:0;}
  .qb-main{overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:20px;}
  .qb-side{border-left:1px solid var(--line);background:var(--surface-2);overflow-y:auto;}
  .qb-section{}
  .qb-h{font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:11px;display:flex;align-items:baseline;gap:8px;}
  .qb-h-sub{font-size:11px;font-weight:400;color:var(--faint);letter-spacing:0;}
  .qb-int{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .qb-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 11px;cursor:pointer;transition:border-color .12s,background .12s,box-shadow .12s;background:var(--surface);}
  .qb-card:hover{border-color:var(--accent);}
  .qb-card.on{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent);}
  .qb-card-top{display:flex;align-items:flex-start;gap:8px;}

/* ---------------- Excel-style column filter engine ----------------
   Per-column filter state: {picked:string[]|null, cond:{op,a,b}|null}.
   picked=null  → all values allowed (no checklist filter).
   picked=[...] → only rows whose value-key is in the list pass.
   cond         → an Excel-style condition (text/number/date). ANDed with picked. */
function xfKey(v,type){ // canonical membership/grouping key for a cell value
  if(v==null||v==="")return"";
  if(type==="date")return String(dayStart(+v));
  if(type==="number")return String(+v);
  return String(v).trim();
}
function xfLabel(v,type){
  if(v==null||v==="")return"(Blanks)";
  if(type==="date")return fmtDate(+v);
  return String(v).trim();
}
function xfDistinct(rows,get,type){ // [{key,label}] sorted, deduped
  const m=new Map();
  rows.forEach(r=>{const v=get(r);const k=xfKey(v,type);if(!m.has(k))m.set(k,xfLabel(v,type));});
  const arr=[...m.entries()].map(([key,label])=>({key,label}));
  arr.sort((a,b)=>{
    if(a.key===""!==(b.key===""))return a.key===""?1:-1; // blanks last
    if(type==="number")return (+a.key||0)-(+b.key||0);
    if(type==="date")return (+a.key||0)-(+b.key||0);
    const al=a.label.toLowerCase(),bl=b.label.toLowerCase();return al<bl?-1:al>bl?1:0;
  });
  return arr;
}
function xfActive(f){ return !!f && (Array.isArray(f.picked) || !!(f.cond&&f.cond.op)); }
function xfPass(v,f,type){
  if(!f)return true;
  if(Array.isArray(f.picked)&&!f.picked.includes(xfKey(v,type)))return false;
  const c=f.cond;
  if(c&&c.op){
    if(type==="number"){
      const n=(v==null||v==="")?null:+v,a=c.a===""||c.a==null?null:+c.a,b=c.b===""||c.b==null?null:+c.b;
      if(c.op==="eq"&&n!==a)return false;
      if(c.op==="ne"&&n===a)return false;
      if(c.op==="gt"&&!(n!=null&&a!=null&&n>a))return false;
      if(c.op==="ge"&&!(n!=null&&a!=null&&n>=a))return false;
      if(c.op==="lt"&&!(n!=null&&a!=null&&n<a))return false;
      if(c.op==="le"&&!(n!=null&&a!=null&&n<=a))return false;
      if(c.op==="between"&&!(n!=null&&a!=null&&b!=null&&n>=Math.min(a,b)&&n<=Math.max(a,b)))return false;
    }else if(type==="date"){
      const d=(v==null||v==="")?null:dayStart(+v);
      const a=c.a?dayStart(new Date(c.a).getTime()):null,b=c.b?dayStart(new Date(c.b).getTime()):null;
      if(c.op==="on"&&d!==a)return false;
      if(c.op==="before"&&!(d!=null&&a!=null&&d<a))return false;
      if(c.op==="after"&&!(d!=null&&a!=null&&d>a))return false;
      if(c.op==="between"&&!(d!=null&&a!=null&&b!=null&&d>=Math.min(a,b)&&d<=Math.max(a,b)))return false;
    }else{
      const s=String(v==null?"":v).toLowerCase(),a=String(c.a||"").toLowerCase();
      if(c.op==="contains"&&!s.includes(a))return false;
      if(c.op==="ncontains"&&s.includes(a))return false;
      if(c.op==="eq"&&s!==a)return false;
      if(c.op==="ne"&&s===a)return false;
      if(c.op==="begins"&&!s.startsWith(a))return false;
      if(c.op==="ends"&&!s.endsWith(a))return false;
    }
  }
  return true;
}
const XF_OPS={
  text:[["","Show all"],["contains","Contains"],["ncontains","Does not contain"],["eq","Equals"],["ne","Does not equal"],["begins","Begins with"],["ends","Ends with"]],
  number:[["","Show all"],["eq","="],["ne","≠"],["gt",">"],["ge","≥"],["lt","<"],["le","≤"],["between","Between"]],
  date:[["","Show all"],["on","On"],["before","Before"],["after","After"],["between","Between"]]
};
function xf(id,type,f){ // funnel button + Excel filter panel shell; value list is built lazily on open
  f=f||{}; const cond=f.cond||{op:"",a:"",b:""};
  const ops=XF_OPS[type]||XF_OPS.text; const inpType=type==="date"?"date":type==="number"?"number":"text";
  return `<span class="th-fd xf${xfActive(f)?" active":""}" id="${id}" data-type="${type}">
    <span class="th-fd-btn" title="Filter">${I.filter}</span>
    <div class="th-fd-panel xf-panel">

        <input class="xf-a" type="${inpType}" value="${esc(cond.a||"")}" placeholder="Value"${cond.op?"":' style="display:none"'}>
        <input class="xf-b" type="${inpType}" value="${esc(cond.b||"")}" placeholder="and"${cond.op==="between"?"":' style="display:none"'}>
      </div>

      <div class="xf-list"><label class="xf-opt xf-all"><input type="checkbox" class="xf-allcb"><span>(Select All)</span></label><div class="xf-body"></div></div>
      <div class="xf-note" style="display:none"></div>
      <div class="xf-actions"><button class="xf-clear" type="button">Clear</button><button class="xf-apply" type="button">Apply</button></div>

const XF_CAP=300; // max value-checkboxes rendered at once (high-cardinality columns rely on search + conditions)
function wireXf(id,opts){
  const el=document.getElementById(id); if(!el)return;
  const {type,distinct,f,onApply}=opts;
  const btn=el.querySelector(".th-fd-btn"),panel=el.querySelector(".xf-panel");
  const opSel=el.querySelector(".xf-op"),aInp=el.querySelector(".xf-a"),bInp=el.querySelector(".xf-b");
  const search=el.querySelector(".xf-search"),allCb=el.querySelector(".xf-allcb"),body=el.querySelector(".xf-body"),note=el.querySelector(".xf-note");
  let all=null,total=0,sel=(f&&Array.isArray(f.picked))?new Set(f.picked):null; // sel=null → all selected
  const position=()=>{const r=btn.getBoundingClientRect();panel.style.position="fixed";panel.style.right="auto";const pw=panel.offsetWidth||214,ph=panel.offsetHeight||320;let left=Math.min(r.right-pw,window.innerWidth-pw-8);left=Math.max(8,left);let top=r.bottom+4;if(top+ph>window.innerHeight-8)top=Math.max(8,window.innerHeight-ph-8);panel.style.left=left+"px";panel.style.top=top+"px";};
  const syncCond=()=>{const op=opSel.value;aInp.style.display=op?"":"none";bInp.style.display=op==="between"?"":"none";};
  const syncAll=()=>{const n=sel===null?total:sel.size;allCb.checked=total>0&&n>=total;allCb.indeterminate=n>0&&n<total;};
  const renderList=()=>{
    const q=search.value.toLowerCase();
    const items=q?all.filter(d=>d.label.toLowerCase().includes(q)):all;
    const shown=items.slice(0,XF_CAP);
    body.innerHTML=shown.map(d=>`<label class="xf-opt"><input type="checkbox" data-key="${esc(d.key)}"${(sel===null||sel.has(d.key))?" checked":""}><span>${esc(d.label)}</span></label>`).join("");
    if(items.length>XF_CAP){note.style.display="";note.textContent=`Showing ${XF_CAP} of ${items.length} — refine search or use the condition above.`;}else note.style.display="none";
    body.querySelectorAll("input").forEach(cb=>cb.onchange=()=>{if(sel===null)sel=new Set(all.map(d=>d.key));if(cb.checked)sel.add(cb.dataset.key);else sel.delete(cb.dataset.key);syncAll();});
    syncAll();
  };
  const build=()=>{if(all)return;all=distinct()||[];total=all.length;renderList();};
  btn.onclick=e=>{e.stopPropagation();const open=el.classList.contains("open");document.querySelectorAll(".th-fd.open,.sdd.open").forEach(x=>x.classList.remove("open"));if(!open){build();el.classList.add("open");position();syncCond();setTimeout(()=>search.focus(),0);}};
  panel.onclick=e=>e.stopPropagation();
  opSel.onchange=syncCond;
  search.oninput=renderList;
  allCb.onchange=()=>{sel=allCb.checked?null:new Set();allCb.indeterminate=false;renderList();};
  const apply=()=>{const picked=(sel===null||sel.size>=total)?null:[...sel];const op=opSel.value,cond=op?{op,a:aInp.value,b:bInp.value}:null;el.classList.remove("open");onApply({picked,cond});};
  el.querySelector(".xf-apply").onclick=e=>{e.stopPropagation();apply();};
  el.querySelector(".xf-clear").onclick=e=>{e.stopPropagation();el.classList.remove("open");onApply({picked:null,cond:null});};
  panel.querySelectorAll("input,select").forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();apply();}else if(e.key==="Escape")el.classList.remove("open");}));
}

function pageSlice(rows,pageKey){ // clamps state[pageKey], returns the current page's rows
  const per=state._perPage,pages=per?Math.max(1,Math.ceil(rows.length/per)):1;
  const page=Math.min(Math.max(1,state[pageKey]||1),pages); state[pageKey]=page;
  return {page,per,rows:per?rows.slice((page-1)*per,page*per):rows};
}
function wirePager(root,total,pageKey,draw){
  const per=state._perPage,pages=per?Math.max(1,Math.ceil(total/per)):1;
  root.querySelectorAll(".tpager-btn").forEach(b=>b.onclick=e=>{e.stopPropagation();const p=state[pageKey]||1;state[pageKey]=b.dataset.pg==="prev"?Math.max(1,p-1):Math.min(pages,p+1);draw();});
  const s=root.querySelector(".tpager-per");if(s){s.onclick=e=>e.stopPropagation();s.onchange=()=>{state._perPage=+s.value;state[pageKey]=1;draw();};}

function tfStart(tf){
  const now=Date.now(), d=new Date(); d.setHours(0,0,0,0);
  if(tf==="7d")return now-7*864e5;
  if(tf==="30d")return now-30*864e5;
  if(tf==="90d")return now-90*864e5;
  if(tf==="ytd"){d.setMonth(0,1);return d.getTime();}
  return 0; // "all"
}

/* ---------------- duplicate detection ---------------- */
const normStr=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
const domainOf=url=>{try{const u=url.includes("://")?url:"https://"+url;return new URL(u).hostname.replace(/^www\./,"").toLowerCase();}catch{return normStr(url);}};

function findDuplicateContacts(data){
  const results=[];
  const email=normStr(data.email);
  const fullName=normStr((data.firstName||"")+" "+(data.lastName||""));
  live(state.contacts).forEach(c=>{
    if(data.id&&c.id===data.id)return;
    const reasons=[];
    if(email&&email===normStr(c.email))reasons.push("Same email");
    if(fullName&&fullName.length>2&&fullName===normStr((c.firstName||"")+" "+(c.lastName||"")))reasons.push("Same name");
    if(reasons.length)results.push({record:c,reasons});
  });
  return results;
}

function findDuplicateCompanies(data){
  const results=[];
  const name=normStr(data.name);
  const domain=data.website?domainOf(data.website):"";
  live(state.companies).forEach(c=>{
    if(data.id&&c.id===data.id)return;
    const reasons=[];
    if(name&&name===normStr(c.name))reasons.push("Same name");
    if(domain&&domain.length>3&&c.website&&domain===domainOf(c.website))reasons.push("Same website");
    if(reasons.length)results.push({record:c,reasons});
  });
  return results;
}

    });
  };

  overlay.innerHTML=`<div class="dup-modal-box" style="width:min(760px,100%)">
    <div class="dup-head"><h2>${I.alert} Duplicate ${isContact?"contacts":"companies"}</h2><button class="iconbtn" id="dupX">${I.x}</button></div>
    <div class="dup-body"></div>
    <div class="dup-foot"><button class="btn primary" id="dupDone">Done</button></div>
  </div>`;
  overlay.querySelector("#dupX").onclick=close;
  overlay.querySelector("#dupDone").onclick=close;
  renderPairs();
}

async function mergeDuplicates(type,keepId,discardId){
  const arr=type==="contacts"?state.contacts:state.companies;
  const keep=arr.find(r=>r.id===keepId);
  const discard=arr.find(r=>r.id===discardId);
  if(!keep||!discard){toast("Record not found","err");return;}

  const patch={};
  const fields=type==="contacts"
    ?["firstName","lastName","email","phone","title","companyId","status","source","tags","notes","owner"]
    :["name","website","industry","size","location","notes","owner","dataSources"];
  fields.forEach(f=>{
    if(!keep[f]&&discard[f])patch[f]=discard[f];
    if(Array.isArray(keep[f])&&Array.isArray(discard[f]))patch[f]=[...new Set([...keep[f],...discard[f]])];
  });
  if(Object.keys(patch).length)await dbUpdate(type,keepId,patch,true);

  if(type==="companies"){
    for(const c of live(state.contacts).filter(c=>c.companyId===discardId))
      await dbUpdate("contacts",c.id,{companyId:keepId},true);
    for(const d of live(state.deals).filter(d=>d.companyId===discardId))
      await dbUpdate("deals",d.id,{companyId:keepId},true);
  }
  if(type==="contacts"){
    for(const d of live(state.deals).filter(d=>d.contactId===discardId))
      await dbUpdate("deals",d.id,{contactId:keepId},true);
    for(const t of live(state.tasks).filter(t=>t.relatedType==="contact"&&t.relatedId===discardId))
      await dbUpdate("tasks",t.id,{relatedId:keepId},true);
  }
  await dbRemove(type,discardId,"Duplicate");
  logActivity("contact",`Merged duplicate ${type==="contacts"?"contact":"company"}: kept record ${keepId}`,type==="contacts"?"contact":"company",keepId);
  toast("Records merged","ok");
}

function openMergeModal(type,existingId,newData){
  const isContact=type==="contacts";
  const arr=isContact?state.contacts:state.companies;
  const existing=arr.find(r=>r.id===existingId);
  if(!existing)return;

  const overlay=document.createElement("div");
  overlay.className="merge-modal";
  document.body.appendChild(overlay);
  const close=()=>overlay.remove();

  const fields=isContact
    ?[["firstName","First name"],["lastName","Last name"],["email","Email"],["phone","Phone"],["title","Title"],["status","Status"],["owner","Owner"],["notes","Notes"]]
    :[["name","Name"],["website","Website"],["industry","Industry"],["size","Size"],["location","Location"],["owner","Owner"],["notes","Notes"]];

  const existName=isContact?contactName(existing):existing.name;
  const newName=newData?(isContact?`${newData.firstName||""} ${newData.lastName||""}`.trim():newData.name):"";

  if(!newData){
    const candidates=isContact?findDuplicateContacts(existing):findDuplicateCompanies(existing);
    if(!candidates.length){close();toast("No duplicates found");return;}
    const other=candidates[0].record;
    const otherName=isContact?contactName(other):other.name;
    const rowsHtml=fields.map(([f,lbl])=>{
      const sa=Array.isArray(existing[f])?existing[f].join(", "):String(existing[f]||"");
      const sb=Array.isArray(other[f])?other[f].join(", "):String(other[f]||"");
      if(!sa&&!sb)return"";
      const aWins=sa&&!sb;const bWins=sb&&!sa;
      return `<tr>
        <td class="field-label">${esc(lbl)}</td>
        <td class="${aWins?"val-keep":""}" style="cursor:pointer" onclick="document.getElementById('mk_${f}').checked=true">
          <label style="cursor:pointer;display:flex;align-items:center;gap:6px"><input type="radio" name="mk_${f}" id="mk_${f}" value="a" ${aWins||sa?"checked":""}> ${esc(sa||"—")}</label></td>
        <td class="${bWins?"val-keep":""}" style="cursor:pointer" onclick="document.getElementById('mk_${f}_b').checked=true">
          <label style="cursor:pointer;display:flex;align-items:center;gap:6px"><input type="radio" name="mk_${f}" id="mk_${f}_b" value="b" ${bWins?"checked":""}> ${esc(sb||"—")}</label></td>
      </tr>`;
    }).join("");

    overlay.innerHTML=`<div class="merge-modal-box">
      <div class="bulk-head"><h2>Merge duplicates</h2><button class="iconbtn" id="mrgX">${I.x}</button></div>
      <div class="bulk-body">
        <p style="font-size:13px;color:var(--muted);margin:0 0 14px">Choose which value to keep for each field. The winning record will be updated and the duplicate will be removed.</p>
        <div style="overflow-x:auto"><table class="merge-table">
          <thead><tr><th>Field</th><th style="color:var(--ok)">${esc(existName)} (keep)</th><th>${esc(otherName)} (remove)</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table></div>
      </div>
      <div class="bulk-foot">
        <button class="btn" id="mrgCancel">Cancel</button>
        <button class="btn primary" id="mrgConfirm">Merge records</button>
      </div>
    </div>`;
    overlay.querySelector("#mrgX").onclick=close;
    overlay.querySelector("#mrgCancel").onclick=close;
    overlay.querySelector("#mrgConfirm").onclick=async()=>{
      const patch={};
      fields.forEach(([f])=>{
        const sel=overlay.querySelector(`input[name="mk_${f}"]:checked`);
        if(sel&&sel.value==="b")patch[f]=other[f];
      });
      if(Object.keys(patch).length)await dbUpdate(type,existingId,patch,true);
      if(type==="companies"){
        for(const c of live(state.contacts).filter(c=>c.companyId===other.id))
          await dbUpdate("contacts",c.id,{companyId:existingId},true);
        for(const d of live(state.deals).filter(d=>d.companyId===other.id))
          await dbUpdate("deals",d.id,{companyId:existingId},true);
      }
      if(type==="contacts"){
        for(const d of live(state.deals).filter(d=>d.contactId===other.id))
          await dbUpdate("deals",d.id,{contactId:existingId},true);
        for(const t of live(state.tasks).filter(t=>t.relatedType==="contact"&&t.relatedId===other.id))
          await dbUpdate("tasks",t.id,{relatedId:existingId},true);
      }
      await dbRemove(type,other.id,"Duplicate");
      logActivity("contact",`Merged duplicate into ${esc(existName)}`,type==="contacts"?"contact":"company",existingId);
      toast("Merged","ok");close();
    };
    return;
  }

  const rowsHtml=fields.map(([f,lbl])=>{
    const sa=Array.isArray(existing[f])?existing[f].join(", "):String(existing[f]||"");
    const sb=Array.isArray(newData[f])?newData[f].join(", "):String(newData[f]||"");
    if(!sa&&!sb)return"";
    const aWins=sa&&!sb;
    return `<tr>
      <td class="field-label">${esc(lbl)}</td>
      <td class="${aWins?"val-keep":""}" style="cursor:pointer" onclick="document.getElementById('mk_${f}').checked=true">
        <label style="cursor:pointer;display:flex;align-items:center;gap:6px"><input type="radio" name="mk_${f}" id="mk_${f}" value="a" checked> ${esc(sa||"—")}</label></td>
      <td style="cursor:pointer" onclick="document.getElementById('mk_${f}_b').checked=true">
        <label style="cursor:pointer;display:flex;align-items:center;gap:6px"><input type="radio" name="mk_${f}" id="mk_${f}_b" value="b"> ${esc(sb||"—")}</label></td>
    </tr>`;
  }).join("");

  overlay.innerHTML=`<div class="merge-modal-box">
    <div class="bulk-head"><h2>Merge into existing record</h2><button class="iconbtn" id="mrgX">${I.x}</button></div>
    <div class="bulk-body">
      <p style="font-size:13px;color:var(--muted);margin:0 0 14px">Choose which value to keep for each field. The existing record will be updated — no new record will be created.</p>
      <div style="overflow-x:auto"><table class="merge-table">
        <thead><tr><th>Field</th><th style="color:var(--ok)">${esc(existName)} (existing)</th><th>${esc(newName)} (new)</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table></div>
    </div>
    <div class="bulk-foot">
      <button class="btn" id="mrgCancel">Cancel</button>
      <button class="btn primary" id="mrgConfirm">Merge & update existing</button>
    </div>
  </div>`;
  overlay.querySelector("#mrgX").onclick=close;
  overlay.querySelector("#mrgCancel").onclick=close;
  overlay.querySelector("#mrgConfirm").onclick=async()=>{
    const patch={};
    fields.forEach(([f])=>{
      const sel=overlay.querySelector(`input[name="mk_${f}"]:checked`);
      if(sel&&sel.value==="b"&&newData[f]!==undefined)patch[f]=newData[f];
    });
    await dbUpdate(type,existingId,patch,true);
    logActivity("contact",`Updated ${isContact?"contact":"company"} via merge: ${esc(existName)}`,isContact?"contact":"company",existingId);
    toast("Merged into existing record","ok");close();
  };
}

/* ---------------- ETL sync (Instantly / Smartlead) ---------------- */
async function syncEtl(service){
  const key=service==="instantly"?state._etlInstantlyKey:state._etlSmartleadKey;
  if(!key){toast("Enter an API key first","err");return;}
  state._etlSyncing=service;render();
  try{
    const r=await fetch("/api/etl",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service,apiKey:key})});
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||"Sync failed");

    const syncedIds=new Set(JSON.parse(localStorage.getItem("pulse-etl-synced")||"[]"));
    let newContacts=0,updContacts=0,newActs=0;

    for(const c of data.contacts){
      if(syncedIds.has(c.externalId))continue;
      const existing=live(state.contacts).find(x=>x.email&&x.email.toLowerCase()===c.email);
      if(existing){
        const patch={};
        if(c.lastContacted&&(!existing.lastContacted||c.lastContacted>existing.lastContacted))patch.lastContacted=c.lastContacted;
        if(c.status!=="Lead"&&existing.status==="Lead")patch.status=c.status;
        const tags=existing.tags||[];
        if(!tags.includes(service))patch.tags=[...tags,service];
        if(Object.keys(patch).length){await dbUpdate("contacts",existing.id,patch,true);updContacts++;}
      }else{
        let companyId=null;
        if(c.company){
          const existingCo=live(state.companies).find(x=>x.name.toLowerCase()===c.company.toLowerCase());
          companyId=existingCo?existingCo.id:await dbAdd("companies",{name:c.company,owner:state.user?.name||""},true);
        }
        await dbAdd("contacts",{firstName:c.firstName,lastName:c.lastName,email:c.email,phone:c.phone,title:c.title,
          companyId,status:c.status,source:c.source,tags:c.tags,notes:c.notes,
          lastContacted:c.lastContacted,externalId:c.externalId,owner:state.user?.name||""},true);
        newContacts++;
      }
      syncedIds.add(c.externalId);
    }

    await new Promise(ok=>setTimeout(ok,500));

    for(const a of data.activities){
      if(syncedIds.has(a.externalId))continue;
      const contact=live(state.contacts).find(x=>x.email&&x.email.toLowerCase()===a.contactEmail?.toLowerCase());
      await dbAdd("activities",{type:a.type,text:a.text,relatedType:contact?"contact":null,
        relatedId:contact?contact.id:null,actor:service==="instantly"?"Instantly":"Smartlead",externalId:a.externalId},true);
      newActs++;
      syncedIds.add(a.externalId);
    }

    localStorage.setItem("pulse-etl-synced",JSON.stringify([...syncedIds].slice(-5000)));
    localStorage.setItem("pulse-etl-last-"+service,String(Date.now()));
    state._etlStatus={service,synced:Date.now(),newContacts,updContacts,newActs,campaigns:data.campaigns};
    toast(`${service==="instantly"?"Instantly":"Smartlead"}: ${newContacts} new, ${updContacts} updated contacts`,"ok");
  }catch(e){
    state._etlStatus={service,error:e.message};
    toast("Sync failed: "+e.message,"err");
  }
  state._etlSyncing=false;render();
}

async function syncApollo(){
  const key=state._etlApolloKey;

    const r=await fetch("/api/apollo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:key})});

    const syncedIds=new Set(JSON.parse(localStorage.getItem("pulse-apollo-synced")||"[]"));
    let newContacts=0,updContacts=0;

    for(const c of data.contacts){
      if(!c.email&&!c.firstName&&!c.lastName)continue;
      if(c.externalId&&syncedIds.has(c.externalId))continue;
      const existing=c.email?live(state.contacts).find(x=>x.email&&x.email.toLowerCase()===c.email):null;
      if(existing){
        const patch={};
        if(c.lastContacted&&(!existing.lastContacted||c.lastContacted>existing.lastContacted))patch.lastContacted=c.lastContacted;
        if(c.status!=="Lead"&&existing.status==="Lead")patch.status=c.status;
        const tags=existing.tags||[];
        if(!tags.includes("apollo"))patch.tags=[...tags,"apollo"];
        if(Object.keys(patch).length){await dbUpdate("contacts",existing.id,patch,true);updContacts++;}
      }else{
        let companyId=null;
        if(c.company){
          const existingCo=live(state.companies).find(x=>x.name.toLowerCase()===c.company.toLowerCase());
          companyId=existingCo?existingCo.id:await dbAdd("companies",{name:c.company,owner:state.user?.name||""},true);
        }
        await dbAdd("contacts",{firstName:c.firstName,lastName:c.lastName,email:c.email||null,phone:c.phone||null,
          title:c.title||null,linkedinUrl:c.linkedinUrl||null,companyId,status:c.status,source:c.source,
          tags:c.tags,notes:c.notes||null,lastContacted:c.lastContacted,externalId:c.externalId,
          owner:state.user?.name||""},true);
        newContacts++;
      }
      if(c.externalId)syncedIds.add(c.externalId);
    }

    localStorage.setItem("pulse-apollo-synced",JSON.stringify([...syncedIds].slice(-5000)));
    localStorage.setItem("pulse-etl-last-apollo",String(Date.now()));
    state._apolloStatus={synced:Date.now(),newContacts,updContacts,total:data.total};
    toast(`Apollo: ${newContacts} new, ${updContacts} updated contacts`,"ok");
  }catch(e){
    state._apolloStatus={error:e.message};
    toast("Apollo sync failed: "+e.message,"err");
  }
  state._apolloSyncing=false;render();
}

/* ---------------- Slack ETL sync ---------------- */
async function syncSlack(){
  const token=state._slackBotToken;
  if(!token){toast("Enter a Slack Bot Token first","err");return;}
  state._slackSyncing=true;render();
  try{
    const channels=state._slackChannels.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
    const r=await fetch("/api/slack-etl",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"pull",botToken:token,channels})});
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||"Slack sync failed");
    const syncedIds=new Set(JSON.parse(localStorage.getItem("pulse-slack-synced")||"[]"));
    let newActs=0;
    for(const a of data.activities){
      if(syncedIds.has(a.externalId))continue;
      let relatedId=null,relatedType=null;
      if(a.mentions?.length){
        const contact=live(state.contacts).find(x=>x.email&&a.mentions.includes(x.email.toLowerCase()));
        if(contact){relatedId=contact.id;relatedType="contact";}
      }
      await dbAdd("activities",{type:"note",text:a.text,relatedType,relatedId,actor:"Slack",externalId:a.externalId},true);
      newActs++;syncedIds.add(a.externalId);
    }
    localStorage.setItem("pulse-slack-synced",JSON.stringify([...syncedIds].slice(-5000)));
    localStorage.setItem("pulse-slack-last",String(Date.now()));
    state._slackStatus={synced:Date.now(),newActs,messageCount:data.messageCount,channels:data.channelsFetched};
    toast(`Slack: ${newActs} new activities from ${data.channelsFetched} channel${data.channelsFetched!==1?"s":""}`, "ok");
  }catch(e){
    state._slackStatus={error:e.message};
    toast("Slack sync failed: "+e.message,"err");
  }
  state._slackSyncing=false;render();
}

async function notifySlack(text){
  const url=state._slackWebhookUrl;
  if(!url)return;
  try{
    await fetch("/api/slack-etl",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"push",webhookUrl:url,payload:{text}})});

}

/* ---------------- AI ---------------- */
function workspaceContext(){
  const C=live(state.contacts), D=live(state.deals), Co=live(state.companies), T=live(state.tasks), Tk=live(state.tickets);
  const open=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  const openTk=Tk.filter(t=>t.status==="open"||t.status==="in-progress");
  return [
    `PulseCRM workspace snapshot (the ONLY data you may use):`,
    `Contacts (${C.length}): `+C.slice(0,40).map(c=>{const days=c.lastContacted?Math.floor((Date.now()-c.lastContacted)/864e5):null;return `${contactName(c)} [${c.status||"Lead"}] ${companyById(c.companyId)?.name||""}${days===null?" (never contacted)":days===0?" (contacted today)":` (contacted ${days}d ago)`}`;}).join("; "),
    `Companies (${Co.length}): `+Co.slice(0,25).map(c=>c.name+(c.industry?` (${c.industry})`:"")+( c.expectedClose?` close:${fmtDate(c.expectedClose)}`:""  )).join("; "),
    `Open deals (${open.length}): `+open.slice(0,40).map(d=>`"${d.name}" ${money(d.value)} @ ${d.stage} (${companyById(d.companyId)?.name||"?"}) prio:${d.priority||"med"} close:${fmtDate(d.expectedClose)}${d.renewalDate?" renewal:"+fmtDate(d.renewalDate):""}`).join("; "),
    `Open tasks (${T.filter(t=>t.status!=="done").length}): `+T.filter(t=>t.status!=="done").slice(0,30).map(t=>`${t.title} (due ${fmtDate(t.due)})`).join("; "),
    `Open support tickets (${openTk.length}): `+openTk.slice(0,20).map(t=>`"${t.subject}" [${t.status}] prio:${t.priority} type:${t.type}`).join("; "),
    quoteContext(),
  ].join("\n");
}
const AI_SYSTEM=`You are the PulseCRM AI assistant for a sales team. STRICT PRIVACY: use ONLY the workspace snapshot provided in the prompt. Never invent contacts, deals, or numbers that are not present, and never reference any other organization's data. Be concise, concrete, and sales-focused. Use plain text (no markdown headers).`;
async function askAI(userPrompt,extraContext){
  const prompt=`${workspaceContext()}\n${extraContext?extraContext+"\n":""}\nTask: ${userPrompt}`;
  const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,system:AI_SYSTEM})});
  const data=await r.json().catch(()=>({}));
  if(!r.ok){ throw new Error(typeof data.error==="string"?data.error:(data.error?.error?.message||"AI request failed")); }
  return (data.text||"").trim();
}

    // update active class without full sidebar re-render
    document.querySelectorAll("[data-nav]").forEach(x=>x.classList.toggle("on",x===b));
    const sb=$("#sidebar");if(sb){sb.classList.remove("show");}
    renderContent();
  });
  $("#sidebar").querySelector("[data-action=signout]").onclick=doSignOut;
  $("#nav-collapse-btn").onclick=toggleNavCollapse;
  initNavResize();
  syncNavWidth();
}

function syncNavWidth(){
  const shell=$(".shell");
  if(!shell)return;
  const NAV_COLLAPSED_W=54;
  if(state.navCollapsed){
    document.documentElement.style.setProperty("--nav-w",NAV_COLLAPSED_W+"px");
    shell.style.gridTemplateColumns=NAV_COLLAPSED_W+"px 1fr";
  } else {
    try{
      const saved=parseInt(localStorage.getItem("pulse_nav_w"));
      const w=(saved>=180&&saved<=360)?saved:236;
      document.documentElement.style.setProperty("--nav-w",w+"px");
      shell.style.gridTemplateColumns=w+"px 1fr";
    }catch(_){
      document.documentElement.style.setProperty("--nav-w","236px");
      shell.style.gridTemplateColumns="236px 1fr";
    }
  }
}

function toggleNavCollapse(){
  state.navCollapsed=!state.navCollapsed;
  try{localStorage.setItem("pulse-nav-collapsed",state.navCollapsed?"1":"0");}catch(_){}
  renderSidebar();
}

function initNavResize(){
  const handle=$("#nav-resize");
  if(!handle)return;
  if(state.navCollapsed){handle.style.display="none";return;}
  const NAV_MIN=180,NAV_MAX=360;
  const shell=$(".shell");
  let startX,startW;
  handle.onmousedown=e=>{
    e.preventDefault();
    startX=e.clientX;
    startW=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--nav-w"))||236;
    handle.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(ev){
      const w=Math.min(NAV_MAX,Math.max(NAV_MIN,startW+(ev.clientX-startX)));
      document.documentElement.style.setProperty("--nav-w",w+"px");
      shell.style.gridTemplateColumns=w+"px 1fr";
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      const w=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--nav-w"))||236;
      try{localStorage.setItem("pulse_nav_w",w);}catch(_){}
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };
}
