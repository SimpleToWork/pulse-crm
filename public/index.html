/* ---------------- Dashboard ---------------- */
function renderDashboard(c){
  const tf=state._dashTf||"30d";
  const since=tf==="custom"?(state._dashDateFrom?new Date(state._dashDateFrom).getTime():0):tfStart(tf);
  const until=tf==="custom"?(state._dashDateTo?new Date(state._dashDateTo).getTime()+864e5-1:Infinity):Infinity;
  const tfLabels={"7d":"Last 7 days","30d":"Last 30 days","90d":"Last 90 days","ytd":"Year to date","all":"All time","custom":"Custom range"};
  const allDeals=live(state.deals), C=live(state.contacts), T=live(state.tasks);
  // collect unique owners from deals for the filter dropdown
  const owners=[...new Set(allDeals.map(d=>d.owner||"").filter(Boolean))].sort();
  const selOwner=state._dashOwner||"";
  // scope open deals by createdAt; won/lost by closedAt so edits don't shift them between periods
  const Dtf=tf==="all"?allDeals:allDeals.filter(d=>(d.createdAt||0)>=since&&(d.createdAt||0)<=until);
  const D=selOwner?Dtf.filter(d=>(d.owner||"")===selOwner):Dtf;
  const Ctf=tf==="all"?C:C.filter(x=>(x.createdAt||0)>=since&&(x.createdAt||0)<=until);
  const open=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  const allLiveWon=live(state.deals).filter(d=>d.stage==="Won"), allLiveLost=live(state.deals).filter(d=>d.stage==="Lost");
  const wonTf=tf==="all"?allLiveWon:allLiveWon.filter(d=>(d.closedAt||d.createdAt||0)>=since&&(d.closedAt||d.createdAt||0)<=until);
  const lostTf=tf==="all"?allLiveLost:allLiveLost.filter(d=>(d.closedAt||d.createdAt||0)>=since&&(d.closedAt||d.createdAt||0)<=until);
  const won=selOwner?wonTf.filter(d=>(d.owner||"")===selOwner):wonTf;
  const lost=selOwner?lostTf.filter(d=>(d.owner||"")===selOwner):lostTf;
  const pipeVal=open.reduce((s,d)=>s+(+d.value||0),0);
  const wonVal=won.reduce((s,d)=>s+(+d.value||0),0);
  const forecast=open.reduce((s,d)=>s+(+d.value||0)*(stageProb(d.stage)||0)/100,0);
  const winRate=(won.length+lost.length)?Math.round(won.length/(won.length+lost.length)*100):0;
  const dueToday=T.filter(t=>t.status!=="done"&&isToday(t.due)).length;
  const overdue=T.filter(t=>t.status!=="done"&&isOverdue(t.due)).length;
  const newInPeriod=tf==="all"?C.length:Ctf.length;

  const stat=(lbl,val,icon,delta,cls,nav)=>`<div class="card stat"${nav?` data-dash-nav="${nav}"`:""}><div class="lbl"><span class="ic">${icon}</span>${lbl}</div><div class="val">${val}</div>${delta?`<div class="delta ${cls||""}">${delta}</div>`:""}</div>`;

  // pipeline view helpers
  const pv=state._pipeView||"bars";
  const activeStages=stageList().filter(s=>s!=="Won"&&s!=="Lost");

  // view: horizontal bars by value (default)
  const barsView=()=>{
    const maxV=Math.max(1,...activeStages.map(s=>open.filter(d=>d.stage===s).reduce((a,d)=>a+(+d.value||0),0)));
    return activeStages.map(s=>{
      const v=open.filter(d=>d.stage===s).reduce((a,d)=>a+(+d.value||0),0), cnt=open.filter(d=>d.stage===s).length;
      return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:500">${esc(s)}</span><span class="muted">${moneyK(v)} &middot; ${cnt}</span></div>
        <div style="height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden"><div style="height:100%;width:${Math.max(2,v/maxV*100)}%;background:${stageColor(s)};border-radius:5px;transition:width .4s"></div></div></div>`;
    }).join("");
  };

  // view: horizontal bars by deal count
  const countView=()=>{
    const maxC=Math.max(1,...activeStages.map(s=>open.filter(d=>d.stage===s).length));
    return activeStages.map(s=>{
      const cnt=open.filter(d=>d.stage===s).length;
      return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:500">${esc(s)}</span><span class="muted">${cnt} deal${cnt!==1?"s":""}</span></div>
        <div style="height:8px;background:var(--surface-2);border-radius:5px;overflow:hidden"><div style="height:100%;width:${Math.max(cnt?2:0,cnt/maxC*100)}%;background:${stageColor(s)};border-radius:5px;transition:width .4s"></div></div></div>`;
    }).join("");
  };

  // view: SVG donut chart by value
  const donutView=()=>{
    const sd=activeStages.map(s=>({s,v:open.filter(d=>d.stage===s).reduce((a,d)=>a+(+d.value||0),0),c:stageColor(s)})).filter(d=>d.v>0);
    if(!sd.length) return emptyMini("No open deals","Add a deal to see your pipeline.");
    const tot=sd.reduce((a,d)=>a+d.v,0)||1;
    const R=65,r=38,cx=80,cy=80; let ang=-90;
    const arcs=sd.map(d=>{
      const pct=d.v/tot, sw=Math.min(pct*360,359.99);
      const a1=ang*Math.PI/180, a2=(ang+sw)*Math.PI/180;
      const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const ix1=cx+r*Math.cos(a1),iy1=cy+r*Math.sin(a1),ix2=cx+r*Math.cos(a2),iy2=cy+r*Math.sin(a2);
      const lg=sw>180?1:0;
      const p=`M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${ix2.toFixed(1)} ${iy2.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${ix1.toFixed(1)} ${iy1.toFixed(1)}Z`;
      ang+=sw; return `<path d="${p}" fill="${d.c}"/>`;
    }).join("");
    const legend=sd.map(d=>`<div style="display:flex;align-items:center;gap:6px;font-size:11.5px;margin-bottom:5px"><div style="width:8px;height:8px;border-radius:2px;background:${d.c};flex:none"></div><span style="font-weight:500;flex:1">${esc(d.s)}</span><span class="muted">${moneyK(d.v)} &middot; ${Math.round(d.v/tot*100)}%</span></div>`).join("");
    return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
      <svg width="160" height="160" viewBox="0 0 160 160" style="flex:none">${arcs}
        <text x="80" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="var(--ink)">${moneyK(tot)}</text>
        <text x="80" y="91" text-anchor="middle" font-size="10" fill="var(--muted)">open pipeline</text>
      </svg>
      <div style="flex:1;min-width:130px">${legend}</div>
    </div>`;
  };

  const viewContent=pv==="count"?countView():pv==="donut"?donutView():barsView();
  const vb=(v,lbl)=>`<button class="btn ghost sm" data-pipeview="${v}" style="${pv===v?"background:var(--surface-2);color:var(--ink)":""}">${lbl}</button>`;
  const viewToggle=`<div style="display:flex;gap:3px">${vb("bars","Value")}${vb("count","Count")}${vb("donut","Donut")}</div>`;

  // activity feed — filter by timeframe and owner
  const allActs=live(state.activities);
  let acts=(tf==="all"?allActs:allActs.filter(a=>(a.createdAt||0)>=since&&(a.createdAt||0)<=until)).sort((a,b)=>b.createdAt-a.createdAt);
  if(selOwner) acts=acts.filter(a=>(a.actor||"")===selOwner);
  acts=acts.slice(0,8);
  const feed=acts.length?acts.map((a,i)=>`<div class="tl-item"><div class="tl-rail"><div class="tl-node">${actIcon(a.type)}</div>${i<acts.length-1?'<div class="tl-line"></div>':""}</div>
    <div class="tl-body"><div class="tx">${esc(a.text)}</div><div class="mt">${esc(a.actor||"")} &middot; ${timeAgo(a.createdAt)}</div></div></div>`).join(""):emptyMini("No activity yet","Actions across your CRM show up here.");

  const ownerOpts=`<option value="">All salespersons</option>${owners.map(o=>`<option value="${esc(o)}"${selOwner===o?" selected":""}>${esc(o)}</option>`).join("")}`;
  const filterLabel=selOwner?`<span style="background:var(--accent-soft);color:var(--accent-ink);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;margin-left:8px">${esc(selOwner)}</span>`:"";
  const tfBtns=Object.entries(tfLabels).map(([k,v])=>`<button class="btn sm${tf===k?" primary":""}" data-dashtf="${k}">${v}</button>`).join("");

  c.innerHTML=`
    <div class="page-top"><div class="pagehead"><div><h1>Dashboard${filterLabel}</h1><div class="sub">Good to see you, ${esc((state.user.name||"there").split(" ")[0])}. Here's your pipeline at a glance.</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="input" id="dash-owner-filter" style="min-width:160px">${ownerOpts}</select>
        <button class="btn" id="weeklyai">${I.spark}<span>Weekly AI summary</span></button>
      </div></div>
    <div class="toolbar" style="margin-bottom:${tf==="custom"?"4px":"16px"}">${tfBtns}</div>
    <div id="dash-daterange-row" style="display:${tf==="custom"?"flex":"none"};align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap;margin-bottom:12px"><span style="font-size:13px;color:var(--muted)">From</span><input type="date" class="input" id="dash-dfrom" value="${esc(state._dashDateFrom||"")}" style="width:auto"><span style="font-size:13px;color:var(--muted)">to</span><input type="date" class="input" id="dash-dto" value="${esc(state._dashDateTo||"")}" style="width:auto"></div></div>
    <div class="stats">
      ${stat("Open pipeline",moneyK(pipeVal),I.dollar,open.length+" active deals","","deals-open")}
      ${stat("Forecast (weighted)",moneyK(forecast),I.bar,"Prob-adjusted","","deals-open")}
      ${stat("Won this period",moneyK(wonVal),I.trophy,won.length+" deals &middot; "+winRate+"% win rate","up","deals-won")}
      ${stat(tf==="all"?"Total contacts":"New contacts",tf==="all"?C.length:newInPeriod,I.users,(tf==="all"?"—":"+"+newInPeriod+" in period"),newInPeriod?"up":"","contacts")}
      ${stat("Due today",dueToday,I.clock,dueToday===1?"1 task due":"tasks due today","","tasks-today")}
      <div class="card stat${overdue?" od-mini-card":""}" data-dash-nav="tasks-overdue" style="${overdue?"border-left:3px solid var(--danger);cursor:pointer":"cursor:pointer"}">
        <div class="lbl"><span class="ic" style="background:${overdue?"var(--danger-soft)":"var(--ok-soft,#d1fae5)"};color:${overdue?"var(--danger)":"var(--ok)"}">${I.clock}</span>Overdue tasks</div>
        <div class="val" style="font-size:24px;color:${overdue?"var(--danger)":"var(--ok)"}">${overdue}</div>
        <div class="delta ${overdue?"down":"up"}">${overdue?"Need attention":"All on track"}</div>
      </div>
    </div>
    <div id="weeklyai-out"></div>
    <div class="grid2">
      <div class="card panel"><div class="panel-head"><h2>Pipeline by stage</h2>${viewToggle}</div>${viewContent||emptyMini("No open deals","Add a deal to see your pipeline build.")}</div>
      <div class="card panel"><div class="panel-head"><h2>Recent activity</h2><button class="btn ghost sm" id="activity-toggle" title="${state.activityCollapsed?"Expand":"Collapse"} recent activity" style="padding:3px 7px;font-size:12px">${state.activityCollapsed?I.chevronDown:I.chevronUp}</button></div>${state.activityCollapsed?"":` <div class="timeline">${feed}</div>`}</div>
    </div>
    `;
  $("#dash-owner-filter").onchange=e=>{state._dashOwner=e.target.value;try{localStorage.setItem("pulse-dash-owner",state._dashOwner);}catch(_){}renderDashboard(c);};
  c.querySelectorAll("[data-dashtf]").forEach(btn=>btn.onclick=()=>{
    state._dashTf=btn.dataset.dashtf;
    localStorage.setItem("pulse-dash-tf",state._dashTf);
    renderDashboard(c);
  });
  const dashDfEl=$("#dash-dfrom"),dashDtEl=$("#dash-dto");
  if(dashDfEl)dashDfEl.onchange=e=>{state._dashDateFrom=e.target.value;renderDashboard(c);};
  if(dashDtEl)dashDtEl.onchange=e=>{state._dashDateTo=e.target.value;renderDashboard(c);};
  c.querySelectorAll("[data-dash-nav]").forEach(el=>{
    el.onclick=()=>{
      const nav=el.dataset.dashNav;
      if(nav==="deals-won"){state.page="deals";state._dView="list";state._dXf={stage:{picked:["Won"],cond:null}};state._dCloseF="";}
      else if(nav==="deals-open"){state.page="deals";state._dView=state._dView||"board";state._dXf={};state._dCloseF="";}
      else if(nav==="contacts"){state.page="contacts";}
      else if(nav==="tasks-today"){state.page="tasks";const _d=new Date(),_iso=_d.getFullYear()+"-"+String(_d.getMonth()+1).padStart(2,"0")+"-"+String(_d.getDate()).padStart(2,"0");state._tXf={status:{picked:["Open"],cond:null},due:{picked:null,cond:{op:"on",a:_iso,b:""}}};}
      else if(nav==="tasks-overdue"){state.page="tasks";const _d=new Date(),_iso=_d.getFullYear()+"-"+String(_d.getMonth()+1).padStart(2,"0")+"-"+String(_d.getDate()).padStart(2,"0");state._tXf={status:{picked:["Open"],cond:null},due:{picked:null,cond:{op:"before",a:_iso,b:""}}};}
      state.detail=null;render();
    };
  });
  document.querySelectorAll("[data-pipeview]").forEach(b=>b.onclick=()=>{state._pipeView=b.dataset.pipeview;render();});
  $("#weeklyai").onclick=async()=>{
    const btn=$("#weeklyai");btn.disabled=true;btn.innerHTML=`<span class="spin"></span>Analyzing&hellip;`;
    const out=$("#weeklyai-out");
    out.innerHTML=`<div class="insight" style="margin-bottom:18px"><div class="ih">${I.spark}PulseAI &middot; Weekly summary</div><div class="ic-body"><span class="spin"></span> Reviewing your pipeline&hellip;</div></div>`;
    const repCtx=selOwner?` Focus specifically on ${selOwner}'s performance.`:"";
    try{ const t=await askAI(`Summarize this week's sales performance in 4-5 short bullet points: pipeline health, what's progressing, what's at risk, and the single most important action for the team.${repCtx}`);
      out.querySelector(".ic-body").textContent=t; }
    catch(e){ out.querySelector(".ic-body").textContent="⚠️ "+e.message; }
    btn.disabled=false;btn.innerHTML=`${I.spark}<span>Weekly AI summary</span>`;
  };
  $("#activity-toggle").onclick=()=>{
    state.activityCollapsed=!state.activityCollapsed;
    localStorage.setItem("pulse-activity-collapsed",state.activityCollapsed?"1":"0");
    render();
  };
}

/* ---------------- Deals (board + list views) ---------------- */
function renderDeals(c){
  if(!state._pipeOri)state._pipeOri=localStorage.getItem("pulse-pipe-ori")||"h";
  if(!state._dView)state._dView=localStorage.getItem("pulse-deals-view")||"board";
  const ori=state._pipeOri,view=state._dView;
  const tf=state._dealsTf||"all";
  const since=tf==="custom"?(state._dealsTfFrom?new Date(state._dealsTfFrom).getTime():0):tfStart(tf);
  const until=tf==="custom"?(state._dealsTfTo?new Date(state._dealsTfTo).getTime()+864e5-1:Infinity):Infinity;
  const allD=live(state.deals);
  const D=tf==="all"?allD:allD.filter(d=>(d.createdAt||0)>=since&&(d.createdAt||0)<=until);
  const open=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  const boardH=view==="board"&&ori==="h",boardV=view==="board"&&ori==="v",isList=view==="list";
  const tfLabels={"7d":"Last 7 days","30d":"Last 30 days","90d":"Last 90 days","ytd":"Year to date","all":"All time","custom":"Custom range"};
  const tfBtns=Object.entries(tfLabels).map(([k,v])=>`<button class="btn sm${tf===k?" primary":""}" data-dealstf="${k}">${v}</button>`).join("");
  const subLabel=tf==="all"?`${allD.length} total · ${open.length} open · ${moneyK(open.reduce((s,d)=>s+(+d.value||0),0))} in play`:`${D.length} deals in period · ${open.length} open · ${moneyK(open.reduce((s,d)=>s+(+d.value||0),0))} in play`;
  c.innerHTML=`
    <div class="page-top"><div class="pagehead"><div><h1>Deals</h1><div class="sub">${subLabel}</div></div>
      <div style="display:flex;align-items:center;gap:8px">

  });

  if(dealsTfToEl)dealsTfToEl.onchange=e=>{state._dealsTfTo=e.target.value;renderDeals(c);};
  $("#newd").onclick=()=>dealForm();
  $("#ori-h").onclick=()=>setView("board","h");
  $("#ori-v").onclick=()=>setView("board","v");
  $("#ori-list").onclick=()=>setView("list");
  if(isList){
    const SI=()=>`<span class="sort-ind"></span>`;
    const thCls=col=>"sortable"+(state._dSort.col===col?" sorted-"+state._dSort.dir:"");
    const COLS=[
      {k:"name",label:"Deal",type:"text",get:d=>d.name||""},
      {k:"company",label:"Company",type:"text",get:d=>companyById(d.companyId)?.name||""},
      {k:"stage",label:"Stage",type:"text",get:d=>d.stage||""},
      {k:"value",label:"Value",type:"number",get:d=>+d.value||0},
      {k:"priority",label:"Priority",type:"text",get:d=>d.priority||"low"},
      {k:"expectedClose",label:"Close date",type:"date",get:d=>d.expectedClose||null},
      {k:"owner",label:"Owner",type:"text",get:d=>d.owner||""},
      {k:"createdBy",label:"Created by",type:"text",get:d=>d.createdBy||""},

    const draw=()=>{

      if(sc){rows.sort((a,b)=>{

        else if(sc==="stage"){av=stageList().indexOf(a.stage);bv=stageList().indexOf(b.stage);}
        else if(sc==="value"){av=+a.value||0;bv=+b.value||0;}
        else if(sc==="priority"){av=PRIORITIES.indexOf(a.priority||"low");bv=PRIORITIES.indexOf(b.priority||"low");}
        else if(sc==="expectedClose"){av=a.expectedClose||0;bv=b.expectedClose||0;}
        else if(sc==="owner"){av=(a.owner||"").toLowerCase();bv=(b.owner||"").toLowerCase();}
        else if(sc==="createdBy"){av=(a.createdBy||"").toLowerCase();bv=(b.createdBy||"").toLowerCase();}
        else if(sc==="createdAt"){av=a.createdAt||0;bv=b.createdAt||0;}
        else{av=a.updatedAt||0;bv=b.updatedAt||0;}
        return sd==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
      });}else{rows.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));}
      const setSort=col=>{if(state._dSort.col===col)state._dSort.dir=state._dSort.dir==="asc"?"desc":"asc";else{state._dSort.col=col;state._dSort.dir="asc";}state._dPage=1;draw();};
      const pg=pageSlice(rows,"_dPage");

          <th></th></tr></thead><tbody>
          ${pg.rows.map(d=>`<tr data-id="${d.id}">
            <td><div style="font-weight:600;font-size:13px">${esc(d.name)}</div></td>

  } else {

    if(bSearchEl)bSearchEl.oninput=()=>{state._bSearch=bSearchEl.value;try{localStorage.setItem("pulse-deals-bsearch",state._bSearch);}catch(_){}renderDeals(c);};
    const cf=state._dCloseF||"",bq=(state._bSearch||"").toLowerCase();
    const _now=Date.now();
    const _sow=_now-new Date().getDay()*864e5;const _eow=_sow+7*864e5;
    const _som=new Date();_som.setDate(1);_som.setHours(0,0,0,0);
    const _eom=new Date(_som.getFullYear(),_som.getMonth()+1,1).getTime();
    const _soq=new Date();const _qm=Math.floor(_soq.getMonth()/3)*3;_soq.setMonth(_qm,1);_soq.setHours(0,0,0,0);
    const _eoq=new Date(_soq.getFullYear(),_qm+3,1).getTime();
    const filterDeal=d=>{
      const dt=d.expectedClose||d.renewalDate||null;
      if(bq){const co=companyById(d.companyId)?.name||"";if(!(d.name.toLowerCase().includes(bq)||co.toLowerCase().includes(bq)||(d.owner||"").toLowerCase().includes(bq)))return false;}
      if(cf==="overdue"){if(!dt||dt>=_now||d.stage==="Won"||d.stage==="Lost")return false;}
      else if(cf==="week"){if(!dt||dt<_sow||dt>=_eow)return false;}
      else if(cf==="month"){if(!dt||dt<_som.getTime()||dt>=_eom)return false;}
      else if(cf==="q"){if(!dt||dt<_soq.getTime()||dt>=_eoq)return false;}
      else if(cf==="30"){if(!dt||dt<_now||dt>=_now+30*864e5)return false;}
      else if(cf==="set"){if(!dt)return false;}
      else if(cf==="none"){if(dt)return false;}
      return true;
    };
    const board=$("#board");
    const matchSQ=(d,sq)=>{const co=companyById(d.companyId)?.name||"";return d.name.toLowerCase().includes(sq)||co.toLowerCase().includes(sq)||(d.owner||"").toLowerCase().includes(sq);};
    const wireCards=cont=>{cont.querySelectorAll(".dealcard").forEach(card=>{card.draggable=true;card.ondragstart=e=>{e.dataTransfer.setData("text/plain",card.dataset.id);card.classList.add("dragging");};card.ondragend=()=>card.classList.remove("dragging");card.onclick=()=>dealForm(card.dataset.id);});};
    board.innerHTML=stageList().map(s=>{
      const sq=(state._stageSearch[s]||"").toLowerCase();
      const items=D.filter(d=>d.stage===s&&filterDeal(d)&&(!sq||matchSQ(d,sq))).sort((a,b)=>(a.order||0)-(b.order||0));
      const tot=items.reduce((a,d)=>a+(+d.value||0),0);
      return `<div class="kcol" data-stage="${esc(s)}">
        <div class="kcol-head"><span class="dot" style="background:${stageColor(s)}"></span><span class="nm">${s}</span><span class="ct">${items.length}</span><span class="tot">${moneyK(tot)}</span></div>
        <div class="kcol-search">${I.search}<input type="text" placeholder="Search…" value="${esc(state._stageSearch[s]||"")}" data-stage-si="${esc(s)}" autocomplete="off"></div>
        <div class="kcol-cards">${items.length?items.map(d=>dealCard(d,bq)).join(""):(bq||sq?`<div class="kcol-empty">No matches</div>`:"")}</div>
        </div>`;
    }).join("");
    wireCards(board);
    board.querySelectorAll("[data-stage-si]").forEach(inp=>{
      inp.onclick=e=>e.stopPropagation();
      inp.oninput=()=>{
        const s=inp.dataset.stageSi;
        state._stageSearch[s]=inp.value;
        const col=board.querySelector(`.kcol[data-stage="${CSS.escape(s)}"]`);
        if(!col)return;
        const sq=inp.value.toLowerCase();
        const colItems=D.filter(d=>d.stage===s&&filterDeal(d)&&(!sq||matchSQ(d,sq))).sort((a,b)=>(a.order||0)-(b.order||0));
        const colTot=colItems.reduce((a,d)=>a+(+d.value||0),0);
        col.querySelector(".ct").textContent=colItems.length;
        col.querySelector(".tot").textContent=moneyK(colTot);
        const cardsEl=col.querySelector(".kcol-cards");
        cardsEl.innerHTML=colItems.length?colItems.map(d=>dealCard(d,bq)).join(""):(bq||sq?`<div class="kcol-empty">No matches</div>`:"");
        wireCards(cardsEl);
      };
    });
    board.querySelectorAll(".kcol").forEach(col=>{
      col.ondragover=e=>{e.preventDefault();col.classList.add("dragover");};
      col.ondragleave=()=>col.classList.remove("dragover");
      col.ondrop=e=>{e.preventDefault();col.classList.remove("dragover");
        const id=e.dataTransfer.getData("text/plain");const d=state.deals.find(x=>x.id===id);const ns=col.dataset.stage;
        if(d&&d.stage!==ns){ const old=d.stage; const patch={stage:ns,probability:stageProb(ns)}; if(ns==="Won"||ns==="Lost")patch.closedAt=Date.now();
          dbUpdate("deals",id,patch,true); logActivity("stage",`Deal "${d.name}" moved ${old} → ${ns}`,"deal",id); notifySlack(`:arrows_counterclockwise: *Deal stage changed*: "${d.name}" moved from *${old}* → *${ns}* (${money(d.value)})`); toast(`Moved to ${ns}`,"ok"); }
      };
    });
    if(!board.classList.contains("vert")){
      const sizeBoard=()=>{const b=$("#board");if(!b||b.classList.contains("vert"))return;const top=b.getBoundingClientRect().top;b.style.height=(window.innerHeight-top-8)+"px";};
      sizeBoard();
      if(!window._kbResizer){window._kbResizer=sizeBoard;window.addEventListener("resize",sizeBoard,{passive:true});}
    }
  }
}
function dealCard(d,q){
  const co=companyById(d.companyId);
  const h=str=>{const s=esc(str||"");if(!q)return s;const sq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");return s.replace(new RegExp(sq,"gi"),m=>`<mark>${m}</mark>`);};
  return `<div class="dealcard" data-id="${d.id}">
    <div class="dn">${h(d.name)}</div>
    ${co?`<div class="dco">${h(co.name)}</div>`:""}
    <div class="dfoot"><span class="dval">${money(d.value)}</span><span class="prio ${d.priority||"low"}">${esc(d.priority||"low")}</span></div>
    ${d.expectedClose?`<div class="faint" style="font-size:11px">Close ${fmtDate(d.expectedClose)}</div>`:""}
    ${d.renewalDate?`<div class="faint" style="font-size:11px">Renewal ${fmtDate(d.renewalDate)}</div>`:""}</div>`;
}

    });
    const setSort=col=>{if(state._tSort.col===col)state._tSort.dir=state._tSort.dir==="asc"?"desc":"asc";else{state._tSort.col=col;state._tSort.dir="asc";}state._tPage=1;draw();};

function relLabel(t){ if(!t.relatedId)return"";

  if(t.relatedType==="company"){const x=companyById(t.relatedId);return x?"Company · "+x.name:"";}
  return"";}

const SLA_PRIORITY_ORDER=["urgent","high","medium","low"];
const SLA_PRIORITY_LABEL={urgent:"Urgent",high:"High",medium:"Medium",low:"Low"};
const SLA_PRIORITY_COLOR={urgent:"#7c3aed",high:"#dc2626",medium:"#d97706",low:"#94a3b8"};
const CAT_PALETTE=["#5b5bf0","#8b5cf6","#0ea5e9","#16a34a","#f59e0b","#dc2626","#db2777","#0d9488","#64748b"];

function slaRuleFor(priority){
  return live(state.slaRules).find(r=>r.priority===priority)||{firstResponseHours:24,resolutionHours:72};
}
function slaStatus(ticket){
  const rule=slaRuleFor(ticket.priority);
  const age=(Date.now()-(ticket.createdAt||Date.now()))/3600e3;
  if(ticket.status==="resolved"||ticket.status==="closed")return{label:"Resolved",color:"var(--ok)"};
  const resp=rule.firstResponseHours,res=rule.resolutionHours;
  if(age>=res)return{label:"SLA Breached",color:"var(--danger)"};
  if(age>=resp*0.75&&age<resp)return{label:"Response At Risk",color:"var(--warn)"};
  if(age>=res*0.75)return{label:"Resolution At Risk",color:"var(--warn)"};
  return{label:"Within SLA",color:"var(--ok)"};
}

async function resetSlaDefaults(){
  if(!confirm("Reset all SLA rules to defaults?"))return;
  const defaults={urgent:{firstResponseHours:1,resolutionHours:4},high:{firstResponseHours:4,resolutionHours:24},medium:{firstResponseHours:8,resolutionHours:72},low:{firstResponseHours:24,resolutionHours:168}};
  for(const [p,vals] of Object.entries(defaults)){
    const existing=live(state.slaRules).find(r=>r.priority===p);
    if(existing){await dbUpdate("slaRules",existing.id,vals,true);}
    else{await dbAdd("slaRules",{priority:p,...vals},true);}
  }
  toast("SLA rules reset to defaults","ok");render();
}

function renderAnalytics(c){
  const D=live(state.deals);
  const won=D.filter(d=>d.stage==="Won"),lost=D.filter(d=>d.stage==="Lost");
  const wonVal=won.reduce((s,d)=>s+(+d.value||0),0);
  const winRate=(won.length+lost.length)?Math.round(won.length/(won.length+lost.length)*100):0;
  const avg=won.length?Math.round(wonVal/won.length):0;
  // revenue by month (last 6) from closedAt of won deals
  const months=[];const now=new Date();now.setDate(1);
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:d.getFullYear()+"-"+d.getMonth(),label:d.toLocaleDateString("en-US",{month:"short"}),val:0});}
  won.forEach(d=>{const t=d.closedAt||d.updatedAt;const dt=new Date(t);const k=dt.getFullYear()+"-"+dt.getMonth();const m=months.find(x=>x.key===k);if(m)m.val+=(+d.value||0);});
  const maxM=Math.max(1,...months.map(m=>m.val));
  // top sources
  const srcMap={};live(state.contacts).forEach(x=>{const s=x.source||"Unknown";srcMap[s]=(srcMap[s]||0)+1;});
  const srcs=Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,6);const maxS=Math.max(1,...srcs.map(s=>s[1]));
  // rep performance
  const reps={};won.forEach(d=>{const o=d.owner||"Unassigned";reps[o]=reps[o]||{won:0,val:0};reps[o].won++;reps[o].val+=(+d.value||0);});
  const repRows=Object.entries(reps).sort((a,b)=>b[1].val-a[1].val);

  c.innerHTML=`
    <div class="page-top"><div class="pagehead"><div><h1>Analytics</h1><div class="sub">Performance across your pipeline</div></div></div></div>
    <div class="stats">

const TMPL_CATS=["Welcome Email","Proposal","Meeting Recap","Next Steps","Follow-Up","Other"];

function renderTemplates(c){
  const q=(state._tmplSearch||"").toLowerCase();

  let list=live(state.templates);
  if(q)list=list.filter(t=>(t.name||"").toLowerCase().includes(q)||(t.body||"").toLowerCase().includes(q)||(t.category||"").toLowerCase().includes(q));
  if(cat)list=list.filter(t=>t.category===cat);
  list=[...list].sort((a,b)=>(a.category||"").localeCompare(b.category||"")||(a.name||"").localeCompare(b.name||""));

  const catTabs=["",...TMPL_CATS].map(cat=>{
    const count=cat?live(state.templates).filter(t=>t.category===cat).length:live(state.templates).length;
    const on=state._tmplCat===cat;
    return `<button class="btn sm${on?" primary":""}" data-tmpl-cat="${esc(cat)}">${esc(cat||"All")}${count?` <span style="opacity:.7;font-size:11px">(${count})</span>`:""}`;
  }).join("");

  const cards=list.length?list.map(t=>`
    <div class="card" style="padding:16px 18px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">

          <span class="chip" style="margin-top:5px">${esc(t.category||"Other")}</span>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button class="btn sm" data-copy-tmpl="${esc(t.id)}" title="Copy to clipboard">${I.copy}<span>Copy</span></button>
          <button class="iconbtn" data-edit-tmpl="${esc(t.id)}" title="Edit">${I.edit}</button>
          <button class="iconbtn" data-del-tmpl="${esc(t.id)}" title="Delete" style="color:var(--danger)">${I.trash}</button>
        </div>
      </div>
      <div style="font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.6;max-height:160px;overflow:hidden;position:relative" class="tmpl-preview">${esc(t.body||"")}</div>
    </div>`).join(""):`<div class="card" style="padding:40px;text-align:center;color:var(--muted)">
    <div style="font-size:36px;margin-bottom:10px">📝</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:6px">${q||cat?"No templates match your filter":"No templates yet"}</div>
    <div style="font-size:13px">${q||cat?"Try a different search or category.":"Add your first template to get started."}</div>
  </div>`;

  c.innerHTML=`
    <div class="page-top"><div class="pagehead"><div><h1>Templates</h1><div class="sub">Reusable message templates for outreach and follow-up</div></div>
      <button class="btn primary" id="new-tmpl">${I.plus}<span>New template</span></button></div>
    <div class="toolbar" style="flex-wrap:wrap;gap:8px">
      <div class="field-search">${I.search}<input id="tmpl-search" placeholder="Search templates…" value="${esc(state._tmplSearch||"")}"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${catTabs}</div>
    </div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px">${cards}</div>`;

  $("#tmpl-search").oninput=e=>{state._tmplSearch=e.target.value;renderTemplates(c);};
  c.querySelectorAll("[data-tmpl-cat]").forEach(b=>b.onclick=()=>{state._tmplCat=b.dataset.tmplCat;renderTemplates(c);});
  $("#new-tmpl").onclick=()=>openTemplateForm(null,c);
  c.querySelectorAll("[data-edit-tmpl]").forEach(b=>b.onclick=()=>openTemplateForm(b.dataset.editTmpl,c));
  c.querySelectorAll("[data-del-tmpl]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Delete this template?"))return;
    await dbRemove("templates",b.dataset.delTmpl,"Template");
  });
  c.querySelectorAll("[data-copy-tmpl]").forEach(b=>b.onclick=()=>{
    const t=state.templates.find(x=>x.id===b.dataset.copyTmpl);
    if(!t)return;
    navigator.clipboard.writeText(t.body||"").then(()=>toast("Copied to clipboard","ok")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=t.body||"";document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("Copied to clipboard","ok");

  overlay.querySelector("#tmplX").onclick=close;

    if(!name){toast("Name is required","err");return;}

  };
}

function initPipelineStagesUI(c){
  const psList=c.querySelector("#ps-list");
  if(!psList)return;
  const hasCustom=live(state.pipelineStages).length>0;
  let stages=hasCustom
    ?[...live(state.pipelineStages)].sort((a,b)=>(a.order||0)-(b.order||0)).map(s=>({...s}))
    :STAGES.map((name,i)=>({name,color:STAGE_COLOR[name]||"#94a3b8",probability:STAGE_PROB[name]||0,order:i}));
  const PROTECTED=["Won","Lost"];
  function renderList(){
    psList.innerHTML=stages.map((s,i)=>`
      <div class="ps-row" draggable="true" data-idx="${i}" style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-2);border-radius:var(--r-sm);cursor:grab;user-select:none;border:1px solid var(--line)">
        <span style="color:var(--faint);font-size:16px;cursor:grab;flex:none">&#8801;</span>
        <input type="color" value="${esc(s.color)}" data-color="${i}" title="Stage color" style="width:26px;height:26px;border:none;border-radius:50%;cursor:pointer;padding:2px;background:none;flex:none">
        <span style="font-size:13px;font-weight:600;flex:1;min-width:80px">${esc(s.name)}</span>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);flex:none">
          <input type="number" value="${s.probability!=null?s.probability:0}" min="0" max="100" data-prob="${i}" style="width:50px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:var(--surface);color:var(--ink);text-align:right">
          <span>%</span>
        </label>
        ${PROTECTED.includes(s.name)?`<span style="font-size:11px;color:var(--faint);font-weight:600;padding:2px 7px;border:1px solid var(--line);border-radius:20px;flex:none">fixed</span>`:`<button data-del="${i}" title="Remove stage" style="background:none;border:none;cursor:pointer;color:var(--danger);padding:3px;font-size:14px;flex:none;line-height:1">&#10005;</button>`}
      </div>`).join("");
    psList.querySelectorAll("input[data-color]").forEach(inp=>inp.oninput=e=>{stages[+e.target.dataset.color].color=e.target.value;});
    psList.querySelectorAll("input[data-prob]").forEach(inp=>inp.oninput=e=>{stages[+e.target.dataset.prob].probability=parseInt(e.target.value)||0;});
    psList.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const idx=+b.dataset.del,name=stages[idx].name;
      const inUse=live(state.deals).filter(d=>d.stage===name).length;
      if(inUse&&!confirm(`"${name}" is used by ${inUse} deal(s). Remove it anyway?`))return;
      stages.splice(idx,1);renderList();
    });
    let dragIdx=null;
    psList.querySelectorAll(".ps-row").forEach((row,i)=>{
      row.ondragstart=e=>{dragIdx=i;row.style.opacity=".4";e.dataTransfer.effectAllowed="move";};
      row.ondragend=()=>{psList.querySelectorAll(".ps-row").forEach(r=>{r.style.opacity="";r.style.outline="";});};
      row.ondragover=e=>{e.preventDefault();if(dragIdx!==null&&dragIdx!==i)row.style.outline="2px solid var(--accent)";};
      row.ondragleave=()=>{row.style.outline="";};
      row.ondrop=e=>{
        e.preventDefault();row.style.outline="";
        if(dragIdx===null||dragIdx===i)return;
        const moved=stages.splice(dragIdx,1)[0];stages.splice(i,0,moved);dragIdx=null;renderList();
      };
    });
  }
  renderList();
  const psAdd=c.querySelector("#ps-add");
  if(psAdd)psAdd.onclick=()=>{
    const name=prompt("New stage name:");
    if(!name||!name.trim())return;
    const trimmed=name.trim();
    if(stages.some(s=>s.name===trimmed)){toast("A stage with that name already exists","err");return;}
    stages.push({name:trimmed,color:"#5b5bf0",probability:50,order:stages.length});
    renderList();toast(`Stage "${trimmed}" added — click Save to persist`,"ok");
  };
  const psReset=c.querySelector("#ps-reset");
  if(psReset)psReset.onclick=()=>{
    if(!confirm("Reset to default pipeline stages? Any customizations will be lost."))return;
    stages=STAGES.map((name,i)=>({name,color:STAGE_COLOR[name]||"#94a3b8",probability:STAGE_PROB[name]||0,order:i}));
    renderList();toast("Defaults loaded — click Save to persist","ok");
  };
  const psSave=c.querySelector("#ps-save");
  if(psSave)psSave.onclick=async()=>{
    psSave.disabled=true;psSave.textContent="Saving…";
    try{await savePipelineStages(stages);}finally{psSave.disabled=false;psSave.innerHTML=I.check+"Save order & colors";}
  };
}
async function savePipelineStages(stages){
  if(fbReady){
    const existing=live(state.pipelineStages);
    for(const s of existing)await updateDoc(doc(db,"pipelineStages",s.id),{deletedAt:Date.now()});
    for(let i=0;i<stages.length;i++){
      const {name,color,probability}=stages[i];
      await addDoc(collection(db,"pipelineStages"),{name,color,probability:probability||0,order:i,createdAt:Date.now(),updatedAt:Date.now(),createdBy:state.user?.email||"",deletedAt:null});
    }
    toast("Pipeline stages saved","ok");
  }else{
    state.pipelineStages.forEach(s=>{s.deletedAt=Date.now();});
    let seq=Date.now();
    for(let i=0;i<stages.length;i++){
      const {name,color,probability}=stages[i];
      state.pipelineStages.push({id:"ps-"+(seq++),name,color,probability:probability||0,order:i,createdAt:Date.now(),updatedAt:Date.now(),createdBy:"demo",deletedAt:null});
    }
    toast("Pipeline stages saved (demo — not persisted across refresh)","ok");render();
  }
}

// intId = null → add new; intId = string → edit existing.
function integrationPricingModal(intId,contentEl){

  const overlay=document.createElement("div");
  overlay.className="q-modal";
  document.body.appendChild(overlay);
  const close=()=>overlay.remove();

  const lvlOpts=[1,2,3,4,5].map(n=>`<option value="${n}" ${(existing?.level||1)===n?"selected":""}>${n} — ${["Rating 1 ($2k impl / $1k/mo / 5d)","Rating 2 ($3k impl / $1.5k/mo / 10d)","Rating 3 ($6k impl / $2k/mo / 15d)","Rating 4 ($8k impl / $2.5k/mo / 20d)","Rating 5 ($11k impl / $2.5k/mo / 25d)"][n-1]}</option>`).join("");
  overlay.innerHTML=`<div class="q-box" style="width:min(480px,100%);max-height:92vh">
    <div class="q-head"><h2>${existing?I.edit+" Edit integration":I.plus+" Add integration"}</h2><button class="iconbtn" id="ipX">${I.x}</button></div>
    <div class="q-scroll" style="padding:20px;display:flex;flex-direction:column;gap:14px">
      <div class="setupwarn" style="background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink)">${I.lock} Changes apply to <b>future quotes only</b>. Existing quotes stay frozen.</div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Platform / Integration name *</label>
        <input id="ip-name" class="input" style="width:100%" placeholder="e.g. Shopify Plus" value="${esc(existing?.name||"")}">
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Rating (1 = Basic → 5 = Complex / Legacy) *</label>
        <select id="ip-level" class="input" style="width:100%">${lvlOpts}</select>
      </div>
      <div class="field-row">
        <div style="flex:1">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Implementation cost ($) *</label>
          <input id="ip-impl" class="input" type="number" min="0" step="100" style="width:100%" placeholder="5000" value="${existing!=null?existing.implCost:""}">
        </div>
        <div style="flex:1">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Timeline (days) *</label>
          <input id="ip-days" class="input" type="number" min="1" step="1" style="width:100%" placeholder="14" value="${existing!=null?existing.timeline:""}">
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px">Monthly cost ($/mo) *</label>
        <input id="ip-monthly" class="input" type="number" min="0" step="25" style="width:100%" placeholder="1000" value="${existing!=null?existing.monthlyCost:""}">
      </div>
    </div>
    <div class="q-foot">
      <button class="btn" id="ipCancel">Cancel</button>
      <button class="btn primary" id="ipSave">${existing?"Save changes":"Add integration"}</button>
    </div>
  </div>`;

  overlay.querySelector("#ipX").onclick=close;
  overlay.querySelector("#ipCancel").onclick=close;
  overlay.querySelector("#ipSave").onclick=async()=>{
    const name=overlay.querySelector("#ip-name").value.trim();
    const level=parseInt(overlay.querySelector("#ip-level").value)||1;
    const implCost=parseFloat(overlay.querySelector("#ip-impl").value)||0;
    const timeline=parseInt(overlay.querySelector("#ip-days").value)||0;
    const monthlyCost=parseFloat(overlay.querySelector("#ip-monthly").value)||0;
    if(!name){toast("Name is required","err");return;}
    if(implCost<0||timeline<1||monthlyCost<0){toast("Please enter valid cost and timeline values","err");return;}
    const freshQs=getQuoteSettings();
    let newInts;
    if(existing){
      newInts=freshQs.integrations.map(x=>x.id===intId?{...x,name,level,implCost,timeline,monthlyCost}:x);
    } else {
      const newId="int"+Date.now()+(Math.random()*1e4|0);
      newInts=[...freshQs.integrations,{id:newId,name,level,implCost,timeline,monthlyCost}];
    }
    const ok=freshQs._id
      ?await dbUpdate("quoteSettings",freshQs._id,{integrations:newInts},true)
      :(await dbAdd("quoteSettings",{ai:freshQs.ai,integrations:newInts},true))!=null;
    if(!ok)return;
    close();
    toast(existing?"Integration updated":"Integration added","ok");
    if(contentEl)renderSettings(contentEl);
  };
}

function openDrawer(title,bodyHtml,onSave,saveLabel){
  const d=$("#drawer");
  const _dW=parseInt(localStorage.getItem("pulse_drawer_w"));
  if(_dW>=420&&_dW<=900)d.style.width=_dW+"px"; else d.style.width="";
  d.innerHTML=`<div class="drawer-resize" id="drawer-resize"></div><div class="drawer-head"><h2>${esc(title)}</h2><button class="iconbtn" id="dclose">${I.x}</button></div>
    <div class="drawer-body">${bodyHtml}</div>
    <div class="drawer-foot"><button class="btn" id="dcancel">Cancel</button><button class="btn primary" id="dsave">${esc(saveLabel||"Save")}</button></div>`;
  $("#scrim").classList.add("show");d.classList.add("show");
  const close=()=>closeDrawer();
  $("#dclose").onclick=close;$("#dcancel").onclick=close;
  $("#dsave").onclick=async()=>{ const ok=await onSave(); if(ok!==false)close(); };
  const first=d.querySelector("input,select,textarea");if(first)setTimeout(()=>first.focus(),120);
  initDrawerResize();
}
function initDrawerResize(){
  const handle=$("#drawer-resize");const drawer=$("#drawer");if(!handle||!drawer)return;
  const DW_MIN=420,DW_MAX=900;
  let startX,startW;
  handle.onmousedown=e=>{
    e.preventDefault();
    startX=e.clientX;
    startW=drawer.offsetWidth;
    handle.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(ev){
      const w=Math.min(DW_MAX,Math.max(DW_MIN,startW+(startX-ev.clientX)));
      drawer.style.width=w+"px";
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      try{localStorage.setItem("pulse_drawer_w",drawer.offsetWidth);}catch(_){}
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };
}
function closeDrawer(){const d=$("#drawer");d.classList.remove("show");if(!$("#aipanel")?.classList.contains("show"))$("#scrim").classList.remove("show");}
const val=id=>{const e=document.getElementById(id);return e?e.value.trim():"";};
function field(id,label,opts={}){
  const v=opts.value!=null?String(opts.value):"";
  if(opts.type==="select")return `<div class="field"><label>${esc(label)}</label><select id="${id}">${opts.options.map(o=>`<option value="${esc(o.v!=null?o.v:o)}" ${(o.v!=null?o.v:o)==v?"selected":""}>${esc(o.l!=null?o.l:o)}</option>`).join("")}</select></div>`;
  if(opts.type==="textarea")return `<div class="field"><label>${esc(label)}</label><textarea id="${id}" placeholder="${esc(opts.ph||"")}">${esc(v)}</textarea></div>`;
  return `<div class="field"><label>${esc(label)}</label><input id="${id}" type="${opts.type||"text"}" placeholder="${esc(opts.ph||"")}" value="${esc(v)}"></div>`;
}

  });
  if(!id)setTimeout(()=>{
    const btn=document.getElementById("c_newco_toggle"),sec=document.getElementById("c_newco_section"),sel=document.getElementById("c_company"),srch=document.getElementById("c_company_search");
    if(srch&&sel){
      const allOpts=companyOptions();
      srch.oninput=()=>{const q=srch.value.toLowerCase();const cur=sel.value;const f=q?allOpts.filter(o=>!o.v||o.l.toLowerCase().includes(q)):allOpts;sel.innerHTML=f.map(o=>`<option value="${esc(o.v)}"${o.v===cur?` selected`:``}>${esc(o.l)}</option>`).join("");};
    }

  },50);
  setTimeout(()=>{
    const mic=document.getElementById("c_dictate"),status=document.getElementById("c_dictate_status"),ta=document.getElementById("c_notes");
    if(!mic||!ta)return;
    let mr=null,chunks=[];
    mic.onclick=async()=>{
      if(mr&&mr.state==="recording"){mr.stop();return;}
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        chunks=[];
        mr=new MediaRecorder(stream);
        mr.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
        mr.onstop=async()=>{
          stream.getTracks().forEach(t=>t.stop());
          mic.disabled=true;mic.textContent="⏳";
          if(status){status.style.display="block";status.textContent="Transcribing...";}
          try{
            const blob=new Blob(chunks,{type:mr.mimeType||"audio/webm"});
            const arr=await blob.arrayBuffer();
            const b64=btoa(new Uint8Array(arr).reduce((s,b)=>s+String.fromCharCode(b),""));
            const r=await fetch("/api/transcribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({audio:b64,mimeType:mr.mimeType||"audio/webm"})});
            const d=await r.json();
            if(d.text){const cur=ta.value;ta.value=(cur?cur+"\n":"")+d.text;if(status)status.textContent="Done.";}
            else if(d.error){if(status)status.textContent="Error: "+d.error;}
          }catch(err){if(status)status.textContent="Error: "+err.message;}
          mic.disabled=false;mic.textContent="🎙️ Dictate";
          if(status)setTimeout(()=>{status.style.display="none";},3000);
        };
        mr.start();
        mic.textContent="⏹️ Stop";
        if(status){status.style.display="block";status.textContent="Recording…";}
      }catch(e){toast("Microphone access denied","err");}
    };
  },50);
}

/* ====================================================================
   LIVE QUOTE BUILDER — integration + user-count selectors, dynamic pricing.
   Pricing is driven by admin-controlled settings (AI assumptions +
   integration table). Settings are SNAPSHOTTED into each quote at save
   time and never recalculated, so a saved quote's pricing is frozen.
==================================================================== */
const fmtUSD=(n,dec=2)=>"$"+(Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
const fmtPctV=n=>(Number(n)||0)*100;
// active (current) settings, merged onto defaults; doc.id tracked for upsert.
function getQuoteSettings(){
  const doc=live(state.quoteSettings)[0];
  const ai={...DEFAULT_AI,...(doc&&doc.ai?doc.ai:{})};
  const integrations=(doc&&Array.isArray(doc.integrations)&&doc.integrations.length)
    ?doc.integrations.map(x=>({...x}))
    :DEFAULT_INTEGRATIONS.map(x=>({...x}));
  return {ai,integrations,_id:doc?doc.id:null,aiCostOverride:doc?.aiCostOverride||0,defaultPricePerUser:doc?.defaultPricePerUser||0,defaultAILicensePrice:doc?.defaultAILicensePrice||0};
}
// Derived AI values — every number traceable to a source setting.
function aiDerived(ai){
  const a={...DEFAULT_AI,...(ai||{})};
  const costPerQuestion=(a.avgInputTokens/1e6)*a.inputPrice*a.modelCalls+(a.avgOutputTokens/1e6)*a.outputPrice;
  const provisionedQuestions=a.normalQuestions*a.provisioningBuffer;
  const rawApiCost=provisionedQuestions*costPerQuestion;            // per user / month
  const fullyLoaded=rawApiCost*(1+a.gatewayLoad+a.volatilityMargin);// per user / month
  const expectedPooled=a.totalSeats*a.normalQuestions*costPerQuestion;
  const headroom=a.committedBudget-expectedPooled;
  return {costPerQuestion,provisionedQuestions,rawApiCost,fullyLoaded,expectedPooled,headroom};
}
// Totals for a quote-shaped object {integrations[], users{}, addons{}, ai{}}.
function computeQuoteTotals(q){
  const d=aiDerived(q.ai);
  const ints=q.integrations||[];
  const implementation=ints.reduce((s,it)=>s+(+(it.quotedImplCost!=null?it.quotedImplCost:it.implCost)||0)*(+it.qty||1),0);
  const perIntegrationMonthly=ints.reduce((s,it)=>s+(+(it.quotedMonthlyCost!=null?it.quotedMonthlyCost:it.monthlyCost)||0)*(+it.qty||1),0);
  const timelineDays=ints.reduce((m,it)=>Math.max(m,+it.timeline||0),0);
  const users=Math.max(0,+(q.users?.count)||0);
  const pricePerUser=Math.max(0,+(q.users?.pricePerUser)||0);
  const aiLicenseCount=Math.max(0,+(q.users?.aiLicenseCount!=null?q.users.aiLicenseCount:q.users?.count)||0);
  const aiPricePerUser=(+(q.aiCostOverride)>0?+(q.aiCostOverride):state._aiCostPerUser>0?state._aiCostPerUser:d.fullyLoaded); // per-quote override > Settings default > computed
  const aiMonthly=aiLicenseCount*aiPricePerUser;
  const seatMonthly=users*pricePerUser;
  const bundleMonthly=Math.max(0,+(q.addons?.bundlePrice)||0);
  const dataMonthly=Math.max(0,+(q.addons?.dataVolume)||0);
  const subscriptionMonthly=seatMonthly+bundleMonthly+dataMonthly;
  const subscriptionAnnual=subscriptionMonthly*12;
  const monthly=aiMonthly+subscriptionMonthly;
  const annual=monthly*12;
  const processingCost=seatMonthly*(q.ai?.paymentProcessing||0);
  return {implementation,perIntegrationMonthly,timelineDays,aiPricePerUser,aiMonthly,seatMonthly,bundleMonthly,dataMonthly,subscriptionMonthly,subscriptionAnnual,monthly,annual,processingCost,users,pricePerUser,aiLicenseCount};
}

}

  box.querySelectorAll(".qb-qi").forEach(inp=>inp.oninput=paint);box.querySelectorAll(".qb-qm").forEach(inp=>inp.oninput=()=>{bundleTouched=false;paint();});
  // integration search filter
  const intSearch=overlay.querySelector("#qb-int-search");
  const intEmpty=overlay.querySelector("#qb-int-empty");
  intSearch.oninput=()=>{
    const q=intSearch.value.trim().toLowerCase();
    const visCount={};
    box.querySelectorAll("tr[data-int-id]").forEach(tr=>{
      const name=(tr.querySelector(".qb-int-name")||{}).textContent||"";
      const show=!q||name.toLowerCase().includes(q);
      tr.style.display=show?"":"none";
      if(show){const lvl=settings.integrations.find(it=>it.id===tr.dataset.intId)?.level||1;visCount[lvl]=(visCount[lvl]||0)+1;}
    });
    box.querySelectorAll("tr.qb-lvl-hdr").forEach(tr=>{const lvl=+tr.dataset.level;tr.style.display=(!q||visCount[lvl])?"":"none";});
    intEmpty.style.display=(q&&!Object.keys(visCount).length)?"":"none";
  };
  let aiLicTouched=prefill?.users?.aiLicenseCount!=null;
  ["qb-price","qb-data","qb-ai-cost"].forEach(id=>{const e=overlay.querySelector("#"+id);if(e)e.oninput=paint;});
  const qbUsersInp=overlay.querySelector("#qb-users");if(qbUsersInp)qbUsersInp.oninput=()=>{if(!aiLicTouched){const ai=overlay.querySelector("#qb-ai-users");if(ai)ai.value=qbUsersInp.value;}paint();};
  const qbAiUsersInp=overlay.querySelector("#qb-ai-users");if(qbAiUsersInp)qbAiUsersInp.oninput=()=>{aiLicTouched=true;paint();};
  overlay.querySelector("#qb-bundle").oninput=()=>{bundleTouched=true;paint();};
  // Bidirectional company ↔ contact linking
  const coSel=overlay.querySelector("#qb-company");
  const ctSel=overlay.querySelector("#qb-contact");
  coSel.onchange=()=>{
    const coId=coSel.value;
    const curCt=ctSel.value;
    const opts=ctOptsFor(coId);
    const keepCt=opts.some(o=>o.v===curCt)?curCt:"";
    ctSel.innerHTML=opts.map(o=>opt(o,keepCt)).join("");
  };
  ctSel.onchange=()=>{
    const ct=contactById(ctSel.value);
    if(ct?.companyId){
      coSel.value=ct.companyId;
      const opts=ctOptsFor(ct.companyId);
      ctSel.innerHTML=opts.map(o=>opt(o,ctSel.value)).join("");
    }
  };
  overlay.querySelector("#qbX").onclick=close;
  overlay.querySelector("#qbCancel").onclick=close;
  const saveBtn=overlay.querySelector("#qbSave");
  saveBtn.onclick=async()=>{
    const q=collect();
    if(!q.integrations.length&&!q.users.count){toast("Select at least one integration or add users","err");return;}
    saveBtn.disabled=true;saveBtn.textContent="Saving…";
    const company=companyById(overlay.querySelector("#qb-company").value);
    const name=(overlay.querySelector("#qb-qname").value.trim())||(company?company.name+" — Quote":"Untitled quote");
    const totals=computeQuoteTotals(q);
    const rec={
      name,
      companyId:overlay.querySelector("#qb-company").value||null,
      contactId:overlay.querySelector("#qb-contact").value||null,
      status:overlay.querySelector("#qb-status").value||"draft",
      integrations:q.integrations.map(it=>({name:it.name,implCost:it.implCost,timeline:it.timeline,monthlyCost:it.monthlyCost,qty:it.qty,level:it.level||1,quotedImplCost:it.quotedImplCost,quotedMonthlyCost:it.quotedMonthlyCost})),
      users:q.users,
      addons:q.addons,
      aiCostOverride:q.aiCostOverride||0,
      snapshot:{ai:{...ai},integrations:settings.integrations.map(x=>({...x})),derived:aiDerived(ai),aiCostOverride:q.aiCostOverride||0},
      totals,
    };
    if(editId){
      const ok=await dbUpdate("quotes",editId,rec);
      if(ok!==false){logActivity("note",`Updated quote "${name}" — impl ${money(totals.implementation)}, ${money(totals.monthly)}/mo`,rec.companyId?"company":null,rec.companyId||null);if(onSaved)onSaved(editId);close();}
      else{saveBtn.disabled=false;saveBtn.innerHTML=`${I.edit}Update quote`;}
    }else{
      const id=await dbAdd("quotes",rec);
      if(id){logActivity("note",`Created quote "${name}" — impl ${money(totals.implementation)}, ${money(totals.monthly)}/mo`,rec.companyId?"company":null,rec.companyId||null);if(onSaved)onSaved(id);close();}
      else{saveBtn.disabled=false;saveBtn.innerHTML=`${I.calc}Save quote`;}
    }
  };
  paint();
}

function initAIPanelResize(){
  const handle=$("#ai-resize");const panel=$("#aipanel");if(!handle||!panel)return;
  const AI_MIN=320,AI_MAX=900;
  let startX,startW;
  handle.onmousedown=e=>{
    e.preventDefault();
    startX=e.clientX;
    startW=panel.offsetWidth;
    handle.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(ev){
      const w=Math.min(AI_MAX,Math.max(AI_MIN,startW+(startX-ev.clientX)));
      panel.style.width=w+"px";
    }
    function onUp(){
      handle.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      try{localStorage.setItem("pulse_ai_panel_w",panel.offsetWidth);}catch(_){}
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };
}

async function runAICmdSearch(q, resEl){
  const C=live(state.contacts),Co=live(state.companies),D=live(state.deals);
  const now=Date.now(),DAY=864e5;
  resEl.innerHTML=`<div class="cmdk-grp">AI Results</div><div class="cmdk-item"><span class="ic">${I.spark}</span><div><div><span class="spin"></span>&nbsp;PulseAI is searching…</div><div class="sub">Analyzing ${C.length} contacts, ${Co.length} companies, ${D.length} deals</div></div></div>`;
  try{
    const cData=C.slice(0,60).map(c=>({id:c.id,name:contactName(c),status:c.status||"Lead",company:companyById(c.companyId)?.name||"",lastContactedDays:c.lastContacted?Math.floor((now-c.lastContacted)/DAY):null,owner:c.owner||"",tags:(c.tags||[]).join(",")}));
    const coData=Co.slice(0,30).map(c=>({id:c.id,name:c.name,industry:c.industry||"",size:c.size||"",owner:c.owner||""}));
    const dData=D.slice(0,40).map(d=>({id:d.id,name:d.name,stage:d.stage,value:d.value||0,company:companyById(d.companyId)?.name||"",priority:d.priority||"medium",closeDaysLeft:d.expectedClose?Math.floor((d.expectedClose-now)/DAY):null,assignee:d.assignee||""}));
    const prompt=`CRM workspace data:\nContacts: ${JSON.stringify(cData)}\nCompanies: ${JSON.stringify(coData)}\nDeals: ${JSON.stringify(dData)}\n\nSearch query: "${q}"\n\nReturn ONLY valid JSON (no markdown, no extra text):\n{"contacts":[{"id":"...","reason":"..."}],"companies":[{"id":"...","reason":"..."}],"deals":[{"id":"...","reason":"..."}]}\n\nRules:\n- Only use IDs that exist in the data above\n- Up to 5 results per type, ranked by relevance\n- reason = one short sentence explaining why this record matches\n- Empty array [] for any type with no matches\n- For recency queries: lastContactedDays=null means never contacted; higher number = longer since contacted`;
    const system=`You are a CRM search assistant. Find records matching natural language queries. Return ONLY valid JSON — no markdown fences, no explanation, just the JSON object.`;
    const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,system})});
    const data=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(typeof data.error==="string"?data.error:"AI search failed");
    const text=(data.text||"").trim();
    let parsed;
    try{parsed=JSON.parse(text);}
    catch(_){const m=text.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);else throw new Error("Could not parse AI response");}
    const aiItems=[];
    (parsed.contacts||[]).forEach(r=>{const c=contactById(r.id);if(c)aiItems.push({ic:I.users,label:contactName(c),sub:r.reason,act:()=>{state.detail={type:"contact",id:c.id};render();}});});
    (parsed.companies||[]).forEach(r=>{const c=Co.find(x=>x.id===r.id);if(c)aiItems.push({ic:I.building,label:c.name,sub:r.reason,act:()=>{state.detail={type:"company",id:c.id};render();}});});
    (parsed.deals||[]).forEach(r=>{const d=D.find(x=>x.id===r.id);if(d)aiItems.push({ic:I.dollar,label:d.name,sub:r.reason,act:()=>{state.page="deals";state.detail=null;render();}});});
    if(!aiItems.length){resEl.innerHTML=`<div class="cmdk-grp">AI Results</div><div class="cmdk-empty">PulseAI found no matching records for "${esc(q)}"</div>`;return;}
    let html=`<div class="cmdk-grp">AI Results · "${esc(q)}"</div>`;
    aiItems.forEach((it,i)=>{html+=`<div class="cmdk-item" data-ai="${i}"><span class="ic">${it.ic}</span><div><div>${esc(it.label)}</div>${it.sub?`<div class="sub">${esc(it.sub)}</div>`:""}</div></div>`;});
    resEl.innerHTML=html;
    resEl.querySelectorAll("[data-ai]").forEach(el=>el.onclick=()=>{closeCmdk();aiItems[+el.dataset.ai].act();});
  }catch(e){resEl.innerHTML=`<div class="cmdk-grp">AI Results</div><div class="cmdk-empty">⚠️ ${esc(e.message)}</div>`;}
}

function openCmdk(){
  state.cmdk=true;const box=$("#cmdk");box.classList.add("show");
  const aiSugs=["Prospects I haven't contacted in a while","Hot deals closing this month","High-priority deals at risk","Contacts without a company","New leads added this week"];
  box.innerHTML=`<div class="cmdk-box"><div class="cmdk-in">${I.search}<input id="cmdin" placeholder="Search or ask PulseAI anything…"></div><div class="cmdk-results" id="cmdres"></div></div>`;
  box.onclick=e=>{if(e.target===box)closeCmdk();};
  const inp=$("#cmdin");let sel=0,items=[];
  const build=q=>{
    q=q.toLowerCase();const res=[];
    const pages=[["dashboard","Dashboard",I.grid],["contacts","Contacts",I.users],["companies","Companies",I.building],["deals","Deals",I.trello],["quotes","Quote Builder",I.calc],["tasks","Tasks",I.check],["analytics","Analytics",I.bar],["settings","Settings",I.cog]];
    pages.filter(p=>!q||p[1].toLowerCase().includes(q)).forEach(p=>res.push({grp:"Navigate",ic:p[2],label:p[1],sub:"Go to "+p[1],act:()=>{state.page=p[0];state.detail=null;render();}}));
    if(q){
      live(state.contacts).filter(c=>(contactName(c)+(c.email||"")).toLowerCase().includes(q)).slice(0,5).forEach(c=>res.push({grp:"Contacts",ic:I.users,label:contactName(c),sub:companyById(c.companyId)?.name||c.email||"",act:()=>{state.detail={type:"contact",id:c.id};render();}}));
      live(state.companies).filter(c=>c.name.toLowerCase().includes(q)).slice(0,5).forEach(c=>res.push({grp:"Companies",ic:I.building,label:c.name,sub:c.industry||"",act:()=>{state.detail={type:"company",id:c.id};render();}}));
      live(state.deals).filter(d=>d.name.toLowerCase().includes(q)).slice(0,5).forEach(d=>res.push({grp:"Deals",ic:I.dollar,label:d.name,sub:d.stage+" · "+money(d.value),act:()=>{state.page="deals";state.detail=null;render();setTimeout(()=>dealForm(d.id),100);}}));
      res.push({grp:"Smart Search",ic:I.spark,label:`Ask PulseAI: "${q}"`,sub:"Natural language search · activity recency, status, pipeline signals & more",_noClose:true,act:()=>runAICmdSearch(q,$("#cmdres"))});
    }
    items=res;sel=0;paint(q);
    if(!q){const r=$("#cmdres");r.innerHTML+=`<div class="cmdk-grp">Ask PulseAI</div><div class="cmdk-ai-sug">${aiSugs.map(s=>`<button data-aisug="${esc(s)}">${esc(s)}</button>`).join("")}</div>`;r.querySelectorAll("[data-aisug]").forEach(b=>b.onclick=()=>{inp.value=b.dataset.aisug;runAICmdSearch(b.dataset.aisug,$("#cmdres"));});}
  };
  const paint=q=>{const r=$("#cmdres");
    if(!items.length&&q){r.innerHTML=`<div class="cmdk-empty">No exact match — try PulseAI smart search below</div><div class="cmdk-grp">Smart Search</div><div class="cmdk-item cmdk-ai-item" id="cmdai"><span class="ic">${I.spark}</span><div><div>Ask PulseAI: "${esc(q)}"</div><div class="sub">Search with AI across all records by activity, status, pipeline & more</div></div></div>`;const ai=$("#cmdai");if(ai)ai.onclick=()=>runAICmdSearch(q,r);return;}
    if(!items.length){r.innerHTML="";return;}
    let html="",lastGrp="";items.forEach((it,i)=>{if(it.grp!==lastGrp){html+=`<div class="cmdk-grp">${esc(it.grp)}</div>`;lastGrp=it.grp;}
      html+=`<div class="cmdk-item ${i===sel?"sel":""}${it._noClose?" cmdk-ai-item":""}" data-i="${i}"><span class="ic">${it.ic}</span><div><div>${esc(it.label)}</div>${it.sub?`<div class="sub">${esc(it.sub)}</div>`:""}</div></div>`;});
    r.innerHTML=html;r.querySelectorAll("[data-i]").forEach(el=>el.onclick=()=>{const it=items[+el.dataset.i];if(!it._noClose)closeCmdk();it.act();});};
  inp.oninput=()=>build(inp.value);
  inp.onkeydown=e=>{if(e.key==="ArrowDown"){e.preventDefault();sel=Math.min(items.length-1,sel+1);paint(inp.value);}
    else if(e.key==="ArrowUp"){e.preventDefault();sel=Math.max(0,sel-1);paint(inp.value);}
    else if(e.key==="Enter"){if(items[sel]){const it=items[sel];if(!it._noClose)closeCmdk();it.act();}}
    else if(e.key==="Escape")closeCmdk();};
  build("");setTimeout(()=>inp.focus(),60);
}

function parseCsv(text){
  const rows=[];
  text=text.replace(/\r\n?/g,"\n").trim();
  if(!text)return rows;
  let cur=[],field="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}
    else if(c==='"'){inQ=true;}
    else if(c===","){cur.push(field);field="";}
    else if(c==="\n"){cur.push(field);rows.push(cur);cur=[];field="";}
    else field+=c;
  }
  cur.push(field);
  if(cur.some(x=>x.trim()))rows.push(cur);
  return rows;
}

          _largeFileText=txt;
          const lineCount=(txt.match(/\n/g)||[]).length;
          drop.innerHTML=`${I.note}<div class="bulk-drop-name">${esc(f.name)}</div><div style="font-size:12px;color:var(--faint);margin-top:4px">${(f.size/1024/1024).toFixed(1)} MB · ~${lineCount.toLocaleString()} rows detected</div>`;
          pasteArea.style.display="none";
        } else {
          _largeFileText=null;
          pasteArea.value=txt;
        }
      };
      r.readAsText(f);
    };
    overlay.querySelector("#bkFile").onchange=e=>loadFile(e.target.files[0]);
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("dragover");};
    drop.ondragleave=()=>drop.classList.remove("dragover");
    drop.ondrop=e=>{e.preventDefault();drop.classList.remove("dragover");loadFile(e.dataTransfer.files[0]);};
    overlay.querySelector("#bkNext").onclick=()=>{
      const text=_largeFileText||pasteArea.value.trim();
      if(!text){toast("Paste CSV or upload a file first","err");return;}
      const rows=parseCsv(text);
      if(rows.length<2){toast("Need at least a header row and one data row","err");return;}
      step2(rows);
    };
  };

  // ---- Step 2: preview ----
  const step2=(rows)=>{
    const rawHeaders=rows[0];
    const dataRows=rows.slice(1).filter(r=>r.some(c=>c.trim()));
    if(!dataRows.length){toast("No data rows found in CSV","err");step1();return;}
    const hmap=resolveHeaders(rawHeaders);
    const get=(r,field)=>{const i=hmap[field];return(i!=null&&r[i]!=null)?r[i].trim():"";};

    const errors=[];
    const mapped=dataRows.map((r,i)=>{
      if(isCon){
        const fn=get(r,"firstname"),ln=get(r,"lastname");
        if(!fn&&!ln){errors.push("Row "+(i+2)+": name required");return null;}
        return{firstName:fn,lastName:ln,email:get(r,"email"),phone:get(r,"phone"),title:get(r,"title"),
          _companyName:get(r,"company"),status:get(r,"status")||"Lead",source:get(r,"source"),
          owner:get(r,"owner"),tags:get(r,"tags").split(",").map(t=>t.trim()).filter(Boolean),notes:get(r,"notes"),
          ...(isLeads?{_coWebsite:get(r,"cowebsite"),_coIndustry:get(r,"coindustry"),_coSize:get(r,"cosize"),_coLocation:get(r,"colocation")}:{})};
      } else {
        const nm=get(r,"name");
        if(!nm){errors.push("Row "+(i+2)+": company name required");return null;}
        return{name:nm,website:get(r,"website"),industry:get(r,"industry"),size:get(r,"size"),location:get(r,"location"),owner:get(r,"owner"),notes:get(r,"notes")};
      }
    }).filter(Boolean);

    const rowCount=mapped.length;

    // For leads mode: count new companies that will be created
    let newCoCount=0;
    if(isLeads&&rowCount>0){
      const existingNames=new Set(live(state.companies).map(c=>c.name.toLowerCase()));
      const uniqueNames=new Set(mapped.filter(r=>r._companyName).map(r=>r._companyName.toLowerCase()));
      uniqueNames.forEach(n=>{if(!existingNames.has(n))newCoCount++;});
    }

    const errWarn=errors.length?`<div style="background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);border-radius:var(--r-sm);padding:10px 14px;font-size:12.5px;color:var(--warn);margin-bottom:12px">${errors.length} row(s) skipped — ${errors.slice(0,3).map(esc).join("; ")}${errors.length>3?` (+${errors.length-3} more)`:""}</div>`:"";
    const leadsNote=isLeads&&newCoCount>0?`<div style="background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:var(--r-sm);padding:10px 14px;font-size:12.5px;color:var(--accent);margin-bottom:12px">${newCoCount} new ${newCoCount===1?"company":"companies"} will be created automatically from company names in this file.</div>`:"";

    // flag duplicates in preview
    const dupCheck=isCon?findDuplicateContacts:findDuplicateCompanies;
    const withDups=mapped.map(r=>({...r,_dups:dupCheck(r)}));
    const dupCount=withDups.filter(r=>r._dups.length>0).length;
    const dupWarn=dupCount?`<div class="dup-warn-banner">${I.alert} ${dupCount} row${dupCount>1?"s":""} may already exist in the CRM — flagged below. Duplicates will be skipped on import.</div>`:"";

    const tableRows=withDups.slice(0,100).map(r=>`<tr style="border-bottom:1px solid var(--line);${r._dups.length?"background:var(--warn-soft)":""}">${PREVIEW_COLS.map((col,ci)=>`<td style="padding:6px 10px;font-size:12px;color:var(--muted);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${ci===0&&r._dups.length?`<span class="dup-import-badge">${I.alert}Dup</span> `:""}${esc(r[col]||"")}</td>`).join("")}</tr>`).join("");
    const moreRow=withDups.length>100?`<tr><td colspan="${PREVIEW_COLS.length}" style="padding:8px 10px;font-size:11.5px;color:var(--faint)">…and ${(withDups.length-100).toLocaleString()} more rows not shown</td></tr>`:"";

    const newCount=withDups.filter(r=>!r._dups.length).length;
    const importLabel=dupCount
      ?`Import ${newCount.toLocaleString()} new (skip ${dupCount} dup${dupCount>1?"s":""})`
      :isLeads?`Import ${rowCount.toLocaleString()} contact${rowCount!==1?"s":""}${newCoCount>0?` + ${newCoCount} compan${newCoCount===1?"y":"ies"}`:""}`
      :isCon?`Import ${rowCount.toLocaleString()} contact${rowCount!==1?"s":""}`
      :`Import ${rowCount.toLocaleString()} compan${rowCount!==1?"ies":"y"}`;
    overlay.innerHTML=`<div class="bulk-modal-box">
      <div class="bulk-head"><h2>Preview — ${rowCount.toLocaleString()} ${label} ready</h2><button class="iconbtn" id="bkX">${I.x}</button></div>
      <div class="bulk-body">
        ${steps(2)}
        ${errWarn}${leadsNote}${dupWarn}
        ${rowCount===0?`<div style="text-align:center;padding:30px;color:var(--faint)">No valid rows to import.</div>`:`
        <div style="overflow-x:auto;max-height:300px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-sm)">
          <table style="width:100%;border-collapse:collapse;font-size:12.5px">
            <thead style="position:sticky;top:0;background:var(--surface);z-index:1">
              <tr>${PREVIEW_LABELS.map(l=>`<th style="text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap;font-size:12px">${esc(l)}</th>`).join("")}</tr>
            </thead>
            <tbody>${tableRows}${moreRow}</tbody>
          </table>
        </div>`}
      </div>
      <div class="bulk-foot">
        <button class="btn" id="bkBack">← Back</button>
        ${dupCount?`<button class="btn ghost" id="bkImportAll">Import all (${rowCount})</button>`:""}
        <button class="btn primary" id="bkImport" ${rowCount===0?"disabled":""}>${importLabel}</button>
      </div>
    </div>`;
    overlay.querySelector("#bkX").onclick=close;
    overlay.querySelector("#bkBack").onclick=()=>{overlay.innerHTML="";step1();};
    if(rowCount===0)return;

    const runImport=async(rowsToImport)=>{
      const importCount=rowsToImport.length;
      const stamp=()=>({createdAt:Date.now(),updatedAt:Date.now(),createdBy:state.user?.email||"demo",deletedAt:null});

      // Switch body to progress view
      overlay.querySelector(".bulk-body").innerHTML=`
        ${steps(3)}
        <div style="text-align:center;padding:16px 0 8px">
          <div style="font-weight:600;font-size:14px;margin-bottom:14px" id="bkStatus">Preparing…</div>
          <div class="bulk-progress-wrap">
            <div class="bulk-progress-bar-outer"><div class="bulk-progress-bar-inner" id="bkBar" style="width:0%"></div></div>
            <div class="bulk-progress-text" id="bkPct">0 / ${importCount.toLocaleString()}</div>
          </div>
        </div>`;
      overlay.querySelector(".bulk-foot").innerHTML="";

      const setP=(done,total,msg)=>{
        const bar=overlay.querySelector("#bkBar");
        const pct=overlay.querySelector("#bkPct");
        const st=overlay.querySelector("#bkStatus");
        if(bar)bar.style.width=Math.round(done/total*100)+"%";
        if(pct)pct.textContent=done.toLocaleString()+" / "+total.toLocaleString();
        if(st&&msg)st.textContent=msg;
      };

      let ok=0,fail=0;
      try{
        if(isCon){
          // Phase 1: resolve + create companies
          const coMap={};
          live(state.companies).forEach(c=>{coMap[c.name.toLowerCase()]=c.id;});
          const uniqueNames=[...new Set(rowsToImport.filter(r=>r._companyName).map(r=>r._companyName))];
          const toCreate=uniqueNames.filter(n=>!coMap[n.toLowerCase()]);
          if(toCreate.length>0){
            setP(0,importCount,`Creating ${toCreate.length.toLocaleString()} new ${toCreate.length===1?"company":"companies"}…`);
            if(fbReady){
              for(let i=0;i<toCreate.length;i+=BATCH){
                const b=writeBatch(db);
                toCreate.slice(i,i+BATCH).forEach(nm=>{
                  const r=doc(collection(db,"companies"));
                  coMap[nm.toLowerCase()]=r.id;
                  const coData={name:nm,...stamp()};
                  if(isLeads){
                    const src=rowsToImport.find(row=>row._companyName&&row._companyName.toLowerCase()===nm.toLowerCase());
                    if(src){if(src._coWebsite)coData.website=src._coWebsite;if(src._coIndustry)coData.industry=src._coIndustry;if(src._coSize)coData.size=src._coSize;if(src._coLocation)coData.location=src._coLocation;}
                  }
                  b.set(r,coData);
                });
                await b.commit();
              }
            } else {
              toCreate.forEach(nm=>{
                const id="local-"+(localSeq++);
                const coData={name:nm,...stamp(),id};
                if(isLeads){const src=rowsToImport.find(row=>row._companyName&&row._companyName.toLowerCase()===nm.toLowerCase());if(src){if(src._coWebsite)coData.website=src._coWebsite;if(src._coIndustry)coData.industry=src._coIndustry;if(src._coSize)coData.size=src._coSize;if(src._coLocation)coData.location=src._coLocation;}}
                state.companies.push(coData);
                coMap[nm.toLowerCase()]=id;
              });
            }
          }
          // Phase 2: import contacts in batches
          const contactRecs=rowsToImport.map(r=>({firstName:r.firstName,lastName:r.lastName,email:r.email,phone:r.phone,title:r.title,
            companyId:r._companyName?(coMap[r._companyName.toLowerCase()]||null):null,
            status:r.status,source:r.source,owner:r.owner,tags:r.tags,notes:r.notes}));
          if(fbReady){
            for(let i=0;i<contactRecs.length;i+=BATCH){
              const chunk=contactRecs.slice(i,i+BATCH);
              const b=writeBatch(db);
              chunk.forEach(data=>{b.set(doc(collection(db,"contacts")),{...data,...stamp()});});
              try{await b.commit();ok+=chunk.length;}catch(e){fail+=chunk.length;}
              setP(Math.min(i+BATCH,contactRecs.length),contactRecs.length,"Importing contacts…");
            }
          } else {
            for(let i=0;i<contactRecs.length;i++){
              state.contacts.push({...contactRecs[i],...stamp(),id:"local-"+(localSeq++)});
              ok++;
              if(i%500===0){setP(i+1,contactRecs.length,"Importing contacts…");await new Promise(r=>setTimeout(r,0));}
            }
            render();
            setP(contactRecs.length,contactRecs.length);
          }
        } else {
          // Companies-only import
          const coRecs=rowsToImport.map(r=>({name:r.name,website:r.website,industry:r.industry,size:r.size,location:r.location,owner:r.owner,notes:r.notes}));
          if(fbReady){
            for(let i=0;i<coRecs.length;i+=BATCH){
              const chunk=coRecs.slice(i,i+BATCH);
              const b=writeBatch(db);
              chunk.forEach(data=>{b.set(doc(collection(db,"companies")),{...data,...stamp()});});
              try{await b.commit();ok+=chunk.length;}catch(e){fail+=chunk.length;}
              setP(Math.min(i+BATCH,coRecs.length),coRecs.length,"Importing companies…");
            }
          } else {
            for(let i=0;i<coRecs.length;i++){
              state.companies.push({...coRecs[i],...stamp(),id:"local-"+(localSeq++)});
              ok++;
              if(i%500===0){setP(i+1,coRecs.length,"Importing companies…");await new Promise(r=>setTimeout(r,0));}
            }
            render();
            setP(coRecs.length,coRecs.length);
          }
        }
      }catch(e){toast("Import error: "+e.message,"err");}

      if(ok>0)logActivity("contact",`Bulk imported ${ok} ${label}`+(isLeads&&newCoCount>0?` (+ ${newCoCount} companies)`:""),"","");
      step3(ok,fail,newCoCount);
    };

    overlay.querySelector("#bkImport").onclick=()=>runImport(dupCount?withDups.filter(r=>!r._dups.length):withDups);
    const allBtn=overlay.querySelector("#bkImportAll");
    if(allBtn)allBtn.onclick=()=>runImport(withDups);
  };

  // ---- Step 3: done ----
  const step3=(ok,fail,newCo)=>{
    const allOk=fail===0;
    const coNote=isLeads&&newCo>0?`<div style="font-size:13px;color:var(--muted);margin-top:6px">${newCo.toLocaleString()} new ${newCo===1?"company":"companies"} created</div>`:"";
    overlay.innerHTML=`<div class="bulk-modal-box">
      <div class="bulk-head"><h2>${esc(title)} Imported</h2><button class="iconbtn" id="bkX">${I.x}</button></div>
      <div class="bulk-body">
        ${steps(3)}
        <div style="text-align:center;padding:24px 0 16px">
          <div class="bulk-result-icon ${allOk?"ok":"warn"}">${allOk?"✓":"!"}</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:6px">${ok.toLocaleString()} ${label} imported</div>
          ${coNote}
          ${fail?`<div style="font-size:13px;color:var(--warn);margin-top:8px">${fail.toLocaleString()} record${fail!==1?"s":""} failed</div>`:""}
          <div style="font-size:13px;color:var(--muted);margin-top:10px">Your CRM has been updated.</div>
        </div>
      </div>
      <div class="bulk-foot"><button class="btn primary" id="bkDone">Done</button></div>
    </div>`;
    overlay.querySelector("#bkX").onclick=close;
    overlay.querySelector("#bkDone").onclick=()=>{close();render();};
  };

  step1();
}
</script>
</body>
</html>
